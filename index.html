<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <title>دستیار هوشمند</title>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f5f6fa;
      --card: #ffffff;
      --line: #e8eaf0;
      --text: #1a1d2e;
      --muted: #8b90a5;
      --accent: #7c3aed;
      --accent-light: #f0ecfc;
      --accent2: #06b6d4;
      --good: #3b82f6;
      --danger: #ef4444;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg: 0 12px 32px rgba(0,0,0,.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Vazirmatn', system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle dot pattern background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 50% 0%, var(--accent-light) 0%, transparent 50%),
        var(--bg);
      background-size: 100% 100%;
    }

    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,.85);
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }
    .bar {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      flex: 0 0 auto;
      background: var(--accent);
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: 0 4px 12px rgba(124, 58, 237, .25);
    }
    .brand h1 {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand p {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }
    .toolbar { display: flex; gap: 8px; flex: 0 0 auto; }
    .iconbtn {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all .2s ease;
    }
    .iconbtn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: #fef2f2;
    }
    .iconbtn:active { transform: scale(.94); }

    /* ── Chat Area ── */
    main {
      flex: 1;
      min-height: 0;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 8px 12px 0;
    }
    .chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 4px 20px;
      scroll-behavior: smooth;
    }
    .chat::-webkit-scrollbar { width: 5px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }

    /* ── Empty State ── */
    .empty {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .empty .box {
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: var(--shadow-md);
      margin-bottom: 24px;
    }
    .empty .icon-circle {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--accent-light);
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      color: var(--accent);
    }
    .empty h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .empty p {
      line-height: 1.9;
      color: var(--muted);
      font-size: 14px;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 460px;
    }
    .suggestion-btn {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s ease;
      box-shadow: var(--shadow-sm);
    }
    .suggestion-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }
    .suggestion-btn:active { transform: scale(.96); }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin: 10px 0;
      opacity: 0;
      transform: translateY(8px);
      animation: msgIn .35s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes msgIn { to { opacity: 1; transform: translateY(0); } }

    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }

    .bubble {
      max-width: min(80%, 640px);
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14.5px;
    }
    .user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 14px rgba(124, 58, 237, .2);
    }
    .assistant .bubble {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    .meta {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 5px;
      padding: 0 4px;
    }
    .user .meta { text-align: left; direction: ltr; }
    .assistant .meta { text-align: right; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: var(--accent-light);
      color: var(--accent);
      margin-top: 2px;
    }
    .assistant .avatar { order: 1; }
    .assistant .bubbleWrap { order: 2; }
    .user .avatar { display: none; }

    /* ── Typing Indicator ── */
    .typing {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      height: 20px;
      padding: 0 2px;
    }
    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: .3;
      animation: dot 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes dot {
      0%, 80%, 100% { transform: translateY(0); opacity: .25; }
      40% { transform: translateY(-5px); opacity: .9; }
    }

    /* ── Footer / Composer ── */
    footer {
      padding: 10px 12px 16px;
      position: sticky;
      bottom: 0;
      background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
    }
    .composer {
      max-width: 820px;
      margin: 0 auto;
      background: var(--card);
      border: 1.5px solid var(--line);
      border-radius: 16px;
      padding: 6px 6px 6px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
      box-shadow: var(--shadow-md);
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .composer:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, .1), var(--shadow-md);
    }
    textarea {
      flex: 1;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 14.5px;
      line-height: 1.7;
      min-height: 38px;
      max-height: 140px;
      padding: 8px 0;
      direction: rtl;
    }
    textarea::placeholder { color: #b4b8cc; }

    .send {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      display: grid;
      place-items: center;
      color: #fff;
      flex: 0 0 auto;
      background: var(--accent);
      box-shadow: 0 3px 10px rgba(124, 58, 237, .25);
      transition: transform .1s ease, opacity .2s ease, box-shadow .2s ease;
    }
    .send:hover { box-shadow: 0 5px 16px rgba(124, 58, 237, .35); }
    .send:active { transform: scale(.92); }
    .send:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }

    .hint {
      max-width: 820px;
      margin: 6px auto 0;
      color: var(--muted);
      font-size: 11px;
      padding: 0 6px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    /* ── Toast ── */
    .state { display: none; position: absolute; inset: 0; pointer-events: none; }
    .toast {
      margin: 10px auto 0;
      width: max-content;
      max-width: 88%;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
    }

    /* ── Confirm Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,.25);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      place-items: center;
    }
    .modal-overlay.active { display: grid; }
    .modal {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px 24px 20px;
      max-width: 340px;
      width: 90%;
      box-shadow: var(--shadow-lg);
      text-align: center;
      animation: modalIn .25s cubic-bezier(.16,1,.3,1);
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(.92) translateY(8px); } }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .modal p { color: var(--muted); font-size: 13.5px; line-height: 1.7; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--line);
      transition: all .15s ease;
    }
    .modal-actions button:active { transform: scale(.96); }
    .btn-cancel {
      background: var(--card);
      color: var(--text);
    }
    .btn-cancel:hover { background: var(--bg2); }
    .btn-danger {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }
    .btn-danger:hover { background: #dc2626; }

    /* ── Date Separator ── */
    .date-sep {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 18px 0 12px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 500;
    }
    .date-sep::before,
    .date-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .brand p { display: none; }
      .bubble { max-width: 88%; font-size: 14px; }
      .composer { border-radius: 14px; padding: 5px 5px 5px 12px; }
      .send { width: 38px; height: 38px; border-radius: 10px; }
      textarea { max-height: 110px; font-size: 14px; }
      .suggestions { gap: 8px; }
      .suggestion-btn { padding: 9px 13px; font-size: 12.5px; }
      .empty .box { padding: 28px 20px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .msg { animation: none; opacity: 1; transform: none; }
      .typing span { animation: none; opacity: .5; }
      .modal { animation: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <div class="bar">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
            </svg>
          </div>
          <div>
            <h1>دستیار هوشمند</h1>
            <p>چت هوش مصنوعی</p>
          </div>
        </div>
        <div class="toolbar">
          <button class="iconbtn" id="clearBtn" title="پاک کردن گفتگو" aria-label="پاک کردن گفتگو">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Chat -->
    <main>
      <div class="chat" id="chat" role="log" aria-live="polite"></div>
      <div class="state" id="state"></div>
    </main>

    <!-- Composer -->
    <footer>
      <form class="composer" id="composerForm" onsubmit="return false;">
        <textarea id="input" rows="1" placeholder="پیامت را بنویس..." autofocus aria-label="متن پیام"></textarea>
        <button class="send" id="sendBtn" type="submit" title="ارسال" aria-label="ارسال پیام">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(180deg)">
            <path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>
          </svg>
        </button>
      </form>
      <div class="hint">
        <span>Enter برای ارسال · Shift+Enter خط جدید</span>
        <span id="statusText">آماده</span>
      </div>
    </footer>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h3 id="modalTitle">پاک کردن گفتگو</h3>
      <p>تمام پیام‌ها حذف خواهند شد. این عمل قابل بازگشت نیست.</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancel">انصراف</button>
        <button class="btn-danger" id="modalConfirm">پاک کردن</button>
      </div>
    </div>
  </div>

  <script>
    /* ── عناصر ── */
    const chatEl      = document.getElementById('chat');
    const inputEl      = document.getElementById('input');
    const sendBtn      = document.getElementById('sendBtn');
    const clearBtn     = document.getElementById('clearBtn');
    const stateEl      = document.getElementById('state');
    const statusText   = document.getElementById('statusText');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalCancel  = document.getElementById('modalCancel');
    const modalConfirm = document.getElementById('modalConfirm');
    const composerForm = document.getElementById('composerForm');

    const STORAGE_KEY = 'ai_chat_history_v2';
    const API_URL     = '/v1/chat/completions';
    const API_KEY     = 'freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';

    let messages  = [];
    let busy      = false;
    let typingNode = null;

    /* ── ابزارها ── */
    function nowFa() {
      return new Intl.DateTimeFormat('fa-IR', { hour: '2-digit', minute: '2-digit' }).format(new Date());
    }
    function todayFa() {
      return new Intl.DateTimeFormat('fa-IR', { weekday: 'long', day: 'numeric', month: 'long' }).format(new Date());
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
    }
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages)); }
    function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } }
    function scrollBottom() { requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight; }); }
    function setStatus(t) { statusText.textContent = t; }

    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    }

    function clearState() { stateEl.innerHTML = ''; stateEl.style.display = 'none'; }
    function showError(text) {
      stateEl.style.display = 'block';
      stateEl.innerHTML = `<div class="toast">${text}</div>`;
      setTimeout(clearState, 3500);
    }

    /* ── حالت خالی ── */
    function renderEmpty() {
      chatEl.innerHTML = `
        <div class="empty" id="empty">
          <div class="box">
            <div class="icon-circle">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
              </svg>
            </div>
            <h2>سلام! چی کمکت کنم؟</h2>
            <p>سؤال بپرس، متنی بنویس یا ایده‌ات رو شروع کن. سریع و دقیق جواب می‌دم.</p>
          </div>
          <div class="suggestions">
            <button class="suggestion-btn" data-text="یک برنامه تمرین هفتگی بنویس">برنامه تمرین هفتگی</button>
            <button class="suggestion-btn" data-text="یک داستان کوتاه درباره فضانوردی بنویس">داستان فضایی</button>
            <button class="suggestion-btn" data-text="چگونه می‌توانم برنامه‌نویسی یاد بگیرم؟">راهنمای برنامه‌نویسی</button>
            <button class="suggestion-btn" data-text="پنج ایده برای پروژه‌های خلاقانه بگو">ایده‌های خلاقانه</button>
          </div>
        </div>`;
      chatEl.querySelectorAll('.suggestion-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          inputEl.value = btn.dataset.text;
          autoResize();
          sendMessage();
        });
      });
    }

    /* ── جداکننده تاریخ ── */
    function appendDateSep() {
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.textContent = todayFa();
      chatEl.appendChild(sep);
    }

    /* ── پیام ── */
    function appendMessage(role, content, ts) {
      ts = ts || nowFa();
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;

      const safe = escapeHtml(content);
      const avatarSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>`;

      if (role === 'assistant') {
        wrap.innerHTML = `
          <div class="avatar">${avatarSvg}</div>
          <div class="bubbleWrap">
            <div class="bubble" dir="auto">${safe}</div>
            <div class="meta">هوش مصنوعی · ${ts}</div>
          </div>`;
      } else {
        wrap.innerHTML = `
          <div class="bubbleWrap">
            <div class="bubble" dir="auto">${safe}</div>
            <div class="meta">${ts} · شما</div>
          </div>`;
      }
      chatEl.appendChild(wrap);
      scrollBottom();
      return wrap.querySelector('.bubble');
    }

    /* ── نشانگر تایپ ── */
    function typingIndicator() {
      const msg = document.createElement('div');
      msg.className = 'msg assistant';
      const avatarSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>`;
      msg.innerHTML = `
        <div class="avatar">${avatarSvg}</div>
        <div class="bubbleWrap">
          <div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>
          <div class="meta">در حال نوشتن...</div>
        </div>`;
      chatEl.appendChild(msg);
      scrollBottom();
      return msg;
    }

    /* ── تایپ تدریجی ── */
    async function typeOut(el, text) {
      el.textContent = '';
      el.dir = 'auto';
      const chars = [...text];
      for (let i = 0; i < chars.length; i++) {
        el.textContent += chars[i];
        if (i % 3 === 0) scrollBottom();
        await new Promise(r => setTimeout(r, 10));
      }
      scrollBottom();
    }

    /* ── ارسال ── */
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || busy) return;

      const emptyEl = document.getElementById('empty');
      if (emptyEl) emptyEl.remove();

      /* جداکننده تاریخ اگر اولین پیام است */
      if (messages.length === 0) appendDateSep();

      messages.push({ role: 'user', content: text });
      appendMessage('user', text);
      save();

      inputEl.value = '';
      autoResize();
      busy = true;
      sendBtn.disabled = true;
      clearState();
      setStatus('در حال پاسخ...');
      typingNode = typingIndicator();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + API_KEY
          },
          body: JSON.stringify({ model: 'auto', messages: messages.map(m => ({ role: m.role, content: m.content })) })
        });
        const data = await res.json();
        const content = data?.choices?.[0]?.message?.content || 'پاسخی دریافت نشد.';
        messages.push({ role: 'assistant', content });

        if (typingNode) typingNode.remove();
        const bubble = appendMessage('assistant', '');
        await typeOut(bubble, content);
        save();
        setStatus('آماده');
      } catch (e) {
        if (typingNode) typingNode.remove();
        showError('خطا در ارتباط با سرور. دوباره تلاش کن.');
        setStatus('خطا');
      } finally {
        busy = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    /* ── پاک کردن با تأیید ── */
    function showModal() { modalOverlay.classList.add('active'); }
    function hideModal() { modalOverlay.classList.remove('active'); }

    function clearChat() {
      messages = [];
      save();
      chatEl.innerHTML = '';
      renderEmpty();
      setStatus('پاک شد');
      inputEl.focus();
    }

    /* ── رویدادها ── */
    inputEl.addEventListener('input', autoResize);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    sendBtn.addEventListener('click', e => { e.preventDefault(); sendMessage(); });
    clearBtn.addEventListener('click', () => {
      if (messages.length === 0) return;
      showModal();
    });
    modalCancel.addEventListener('click', hideModal);
    modalConfirm.addEventListener('click', () => { hideModal(); clearChat(); });
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) hideModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') hideModal(); });

    /* ── مقداردهی اولیه ── */
    messages = load();
    if (messages.length) {
      chatEl.innerHTML = '';
      appendDateSep();
      messages.forEach(m => appendMessage(m.role, m.content));
      setStatus('گفتگو بارگذاری شد');
      setTimeout(scrollBottom, 60);
    } else {
      renderEmpty();
    }
    autoResize();
    setTimeout(() => inputEl.focus(), 50);
  </script>
</body>
</html>
