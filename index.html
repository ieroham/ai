<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>چت FreeLLM</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0f172a;color:#e2e8f0;font-family:Vazirmatn,system-ui,Tahoma,sans-serif;display:flex;justify-content:center;height:100vh}
 .app{width:100%;max-width:760px;display:flex;flex-direction:column;height:100vh}
  header{padding:16px;background:#1e293b;border-bottom:1px solid #334155;text-align:center;font-weight:700;font-size:18px}
  main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
 .msg{padding:12px 14px;border-radius:14px;max-width:85%;line-height:1.8;white-space:pre-wrap;word-wrap:break-word}
 .user{align-self:flex-start;background:#2563eb;color:white;border-bottom-right-radius:4px}
 .assistant{align-self:flex-end;background:#1e293b;border:1px solid #334155;border-bottom-left-radius:4px}
  footer{display:flex;gap:8px;padding:12px;background:#1e293b;border-top:1px solid #334155}
  textarea{flex:1;resize:none;height:52px;padding:10px 12px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:15px;font-family:inherit}
  button{padding:0 20px;background:#2563eb;color:white;border:none;border-radius:10px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.6;cursor:not-allowed}
 .hint{font-size:12px;opacity:.7;text-align:center;padding:8px}
</style>
</head>
<body>
<div class="app">
  <header>چت با FreeLLM API</header>
  <main id="chat">
    <div class="msg assistant">سلام! سوالت رو بنویس، من با مدل auto جواب میدم.</div>
  </main>
  <div class="hint">Enter برای ارسال • Shift+Enter برای خط جدید</div>
  <footer>
    <textarea id="input" placeholder="پیام خود را بنویسید..."></textarea>
    <button id="send">ارسال</button>
  </footer>
</div>

<script>
const API_KEY = 'freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

function addMsg(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user'? 'user' : 'assistant');
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  addMsg('user', text);
  input.value = '';
  sendBtn.disabled = true;

  const loading = document.createElement('div');
  loading.className = 'msg assistant';
  loading.textContent = 'در حال فکر کردن...';
  chat.appendChild(loading);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: "auto",
        messages: [{ role: "user", content: text }]
      })
    });

    const data = await res.json();
    loading.remove();

    const reply = data?.choices?.[0]?.message?.content || 'خطا در دریافت پاسخ';
    addMsg('assistant', reply);
  } catch(e){
    loading.remove();
    addMsg('assistant', 'خطا: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.onclick = sendMessage;
input.addEventListener('keydown', e => {
  if(e.key === 'Enter' &&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
