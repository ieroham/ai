<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <title>دستیار هوشمند</title>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f7f7fb;
      --card: #ffffff;
      --line: #e9ebf2;
      --text: #181b2e;
      --muted: #8a8fa8;
      --accent: #6d28d9;
      --accent-hover: #5b21b6;
      --accent-light: #f3effe;
      --accent-glow: rgba(109,40,217,.18);
      --accent2: #0ea5e9;
      --good: #22c55e;
      --danger: #ef4444;
      --shadow-xs: 0 1px 2px rgba(0,0,0,.03);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.04);
      --shadow-md: 0 6px 20px rgba(0,0,0,.06);
      --shadow-lg: 0 16px 40px rgba(0,0,0,.08);
      --radius: 18px;
      --radius-sm: 12px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'Vazirmatn',system-ui,sans-serif;
      color:var(--text);
      background:var(--bg);
      overflow:hidden;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* ── پس‌زمینه پویا ── */
    .bg-layer{
      position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
    }
    .bg-blob{
      position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;
      animation:blobFloat 18s ease-in-out infinite alternate;
    }
    .bg-blob:nth-child(1){
      width:420px;height:420px;top:-120px;right:-80px;
      background:radial-gradient(circle,rgba(109,40,217,.22),transparent 70%);
      animation-duration:20s;
    }
    .bg-blob:nth-child(2){
      width:350px;height:350px;bottom:-100px;left:-60px;
      background:radial-gradient(circle,rgba(14,165,233,.18),transparent 70%);
      animation-duration:24s;animation-delay:-6s;
    }
    .bg-blob:nth-child(3){
      width:260px;height:260px;top:40%;left:50%;
      background:radial-gradient(circle,rgba(109,40,217,.1),transparent 70%);
      animation-duration:16s;animation-delay:-10s;
    }
    @keyframes blobFloat{
      0%{transform:translate(0,0) scale(1)}
      33%{transform:translate(30px,-20px) scale(1.06)}
      66%{transform:translate(-20px,25px) scale(.94)}
      100%{transform:translate(15px,-15px) scale(1.02)}
    }

    /* ── شبکه نقطه‌ای ── */
    .bg-dots{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:radial-gradient(circle,rgba(109,40,217,.06) 1px,transparent 1px);
      background-size:28px 28px;
    }

    .app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}

    /* ── هدر ── */
    header{
      position:sticky;top:0;z-index:10;
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
      padding:10px 16px;
    }
    .bar{
      max-width:800px;margin:0 auto;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{
      width:44px;height:44px;border-radius:13px;flex:0 0 auto;
      background:linear-gradient(135deg,var(--accent),#8b5cf6);
      display:grid;place-items:center;color:#fff;
      box-shadow:0 4px 14px var(--accent-glow);
      position:relative;overflow:hidden;
    }
    .logo::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 60%);
      border-radius:inherit;
    }
    .brand-text h1{font-size:16px;font-weight:800;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand-text .sub{
      margin-top:1px;color:var(--muted);font-size:12px;font-weight:400;
      display:flex;align-items:center;gap:5px;
    }
    .pulse-dot{
      width:6px;height:6px;border-radius:50%;background:var(--good);
      display:inline-block;animation:pulse 2s ease-in-out infinite;
    }
    .pulse-dot.offline{background:var(--danger);animation:none}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

    .toolbar{display:flex;gap:8px;flex:0 0 auto}
    .iconbtn{
      border:1px solid var(--line);background:var(--card);color:var(--muted);
      width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
      cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden;
    }
    .iconbtn::before{
      content:'';position:absolute;inset:0;background:currentColor;opacity:0;
      transition:opacity .15s ease;border-radius:inherit;
    }
    .iconbtn:hover::before{opacity:.06}
    .iconbtn:hover{border-color:var(--danger);color:var(--danger)}
    .iconbtn:active{transform:scale(.92)}
    .iconbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

    /* ── ناحیه چت ── */
    main{
      flex:1;min-height:0;max-width:800px;width:100%;margin:0 auto;
      display:flex;flex-direction:column;padding:4px 12px 0;
    }
    .chat{
      flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
      padding:8px 4px 20px;scroll-behavior:smooth;
    }
    .chat::-webkit-scrollbar{width:5px}
    .chat::-webkit-scrollbar-track{background:transparent}
    .chat::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}
    .chat::-webkit-scrollbar-thumb:hover{background:#d0d2dc}

    /* ── حالت خالی ── */
    .empty{
      min-height:100%;display:flex;flex-direction:column;
      justify-content:center;align-items:center;text-align:center;padding:20px;
    }
    .empty-card{
      max-width:420px;width:100%;
      background:var(--card);border:1px solid var(--line);
      border-radius:24px;padding:40px 30px;
      box-shadow:var(--shadow-md);
      position:relative;overflow:hidden;
      animation:cardFloat 6s ease-in-out infinite;
    }
    @keyframes cardFloat{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }
    .empty-card::before{
      content:'';position:absolute;top:-60px;right:-60px;
      width:160px;height:160px;border-radius:50%;
      background:radial-gradient(circle,var(--accent-light),transparent 70%);
      pointer-events:none;
    }
    .empty-card::after{
      content:'';position:absolute;bottom:-40px;left:-40px;
      width:120px;height:120px;border-radius:50%;
      background:radial-gradient(circle,rgba(14,165,233,.08),transparent 70%);
      pointer-events:none;
    }
    .icon-hero{
      width:60px;height:60px;border-radius:18px;
      background:linear-gradient(135deg,var(--accent-light),rgba(14,165,233,.08));
      display:grid;place-items:center;margin:0 auto 20px;
      color:var(--accent);position:relative;z-index:1;
      box-shadow:0 4px 16px var(--accent-glow);
    }
    .empty-card h2{font-size:21px;font-weight:800;margin-bottom:10px;position:relative;z-index:1}
    .empty-card p{
      line-height:2;color:var(--muted);font-size:14px;
      position:relative;z-index:1;
    }
    .suggestions{
      display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
      max-width:480px;margin-top:24px;
    }
    .sug-btn{
      background:var(--card);border:1px solid var(--line);color:var(--text);
      padding:11px 18px;border-radius:14px;font-family:inherit;
      font-size:13px;cursor:pointer;transition:all .22s ease;
      box-shadow:var(--shadow-xs);position:relative;overflow:hidden;
    }
    .sug-btn::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,var(--accent-light),transparent);
      opacity:0;transition:opacity .22s ease;
    }
    .sug-btn:hover::before{opacity:1}
    .sug-btn:hover{
      border-color:var(--accent);color:var(--accent);
      transform:translateY(-2px);box-shadow:var(--shadow-sm);
    }
    .sug-btn:active{transform:translateY(0) scale(.97)}
    .sug-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    .sug-btn span{position:relative;z-index:1}

    /* ── پیام‌ها ── */
    .msg{
      display:flex;gap:10px;align-items:flex-start;margin:8px 0;
      opacity:0;transform:translateY(10px);
      animation:msgIn .4s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes msgIn{to{opacity:1;transform:translateY(0)}}
    .msg.user{justify-content:flex-end}
    .msg.assistant{justify-content:flex-start}

    .bubble{
      max-width:min(78%,600px);padding:13px 17px;border-radius:var(--radius);
      line-height:1.9;white-space:pre-wrap;word-break:break-word;font-size:14.5px;
      position:relative;
    }
    .user .bubble{
      background:linear-gradient(135deg,var(--accent),#7c3aed);
      color:#fff;border-bottom-right-radius:5px;
      box-shadow:0 4px 18px var(--accent-glow);
    }
    .user .bubble::after{
      content:'';position:absolute;top:0;right:0;
      width:60px;height:60px;border-radius:inherit;
      background:linear-gradient(135deg,rgba(255,255,255,.12),transparent 60%);
      pointer-events:none;
    }
    .assistant .bubble{
      background:var(--card);color:var(--text);
      border:1px solid var(--line);border-bottom-left-radius:5px;
      box-shadow:var(--shadow-sm);
    }

    .msg-actions{
      display:flex;gap:4px;margin-top:6px;padding:0 4px;
      opacity:0;transition:opacity .2s ease;
    }
    .msg:hover .msg-actions{opacity:1}
    .msg-action{
      border:none;background:transparent;color:var(--muted);cursor:pointer;
      padding:4px 6px;border-radius:6px;display:flex;align-items:center;gap:4px;
      font-family:inherit;font-size:11px;transition:all .15s ease;
    }
    .msg-action:hover{background:var(--bg2);color:var(--accent)}
    .msg-action:active{transform:scale(.92)}
    .msg-action.copied{color:var(--good)}

    .meta{font-size:10.5px;color:var(--muted);margin-top:5px;padding:0 4px}
    .user .meta{text-align:left;direction:ltr}
    .assistant .meta{text-align:right}

    .avatar{
      width:34px;height:34px;border-radius:11px;display:grid;place-items:center;
      flex:0 0 auto;margin-top:2px;
      background:linear-gradient(135deg,var(--accent-light),rgba(14,165,233,.06));
      color:var(--accent);box-shadow:var(--shadow-xs);
    }
    .assistant .avatar{order:1}
    .assistant .bubbleWrap{order:2}
    .user .avatar{display:none}

    /* ── نشانگر تایپ ── */
    .typing{display:inline-flex;gap:5px;align-items:center;height:22px;padding:0 2px}
    .typing span{
      width:7px;height:7px;border-radius:50%;background:var(--accent);
      opacity:.25;animation:dot 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(2){animation-delay:.16s}
    .typing span:nth-child(3){animation-delay:.32s}
    @keyframes dot{
      0%,80%,100%{transform:translateY(0);opacity:.2}
      40%{transform:translateY(-6px);opacity:.85}
    }

    /* ── فوتر / نویسنده ── */
    footer{
      padding:8px 12px 16px;position:sticky;bottom:0;z-index:5;
      background:linear-gradient(180deg,transparent 0%,var(--bg) 35%);
    }
    .composer{
      max-width:800px;margin:0 auto;
      background:var(--card);border:1.5px solid var(--line);
      border-radius:16px;padding:6px 6px 6px 14px;
      display:flex;gap:8px;align-items:flex-end;
      box-shadow:var(--shadow-md);
      transition:border-color .25s ease,box-shadow .25s ease;
    }
    .composer:focus-within{
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-glow),var(--shadow-md);
    }
    textarea{
      flex:1;resize:none;border:0;outline:0;background:transparent;
      color:var(--text);font-family:inherit;font-size:14.5px;
      line-height:1.75;min-height:40px;max-height:140px;
      padding:9px 0;direction:rtl;
    }
    textarea::placeholder{color:#c0c3d4}

    .send{
      width:42px;height:42px;border:0;border-radius:var(--radius-sm);
      cursor:pointer;display:grid;place-items:center;color:#fff;
      flex:0 0 auto;
      background:linear-gradient(135deg,var(--accent),#7c3aed);
      box-shadow:0 3px 12px var(--accent-glow);
      transition:all .18s ease;position:relative;overflow:hidden;
    }
    .send::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 50%);
      border-radius:inherit;
    }
    .send:hover{box-shadow:0 5px 20px rgba(109,40,217,.3);transform:translateY(-1px)}
    .send:active{transform:scale(.9) translateY(0)}
    .send:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none}
    .send.stop{
      background:linear-gradient(135deg,#f87171,#ef4444);
      box-shadow:0 3px 12px rgba(239,68,68,.25);
    }
    .send.stop:hover{box-shadow:0 5px 20px rgba(239,68,68,.35)}

    .hint{
      max-width:800px;margin:6px auto 0;
      color:var(--muted);font-size:11px;padding:0 6px;
      display:flex;justify-content:space-between;gap:12px;
    }

    /* ── توست ── */
    .toast-wrap{
      position:fixed;top:20px;left:50%;transform:translateX(-50%);
      z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;
      pointer-events:none;
    }
    .toast{
      pointer-events:auto;
      background:var(--card);border:1px solid var(--line);
      color:var(--text);padding:10px 20px;border-radius:14px;
      font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);
      display:flex;align-items:center;gap:8px;
      animation:toastIn .35s cubic-bezier(.16,1,.3,1) forwards;
    }
    .toast.out{animation:toastOut .3s ease forwards}
    .toast.success{border-color:rgba(34,197,94,.3)}
    .toast.success .toast-icon{color:var(--good)}
    .toast.error{border-color:rgba(239,68,68,.3)}
    .toast.error .toast-icon{color:var(--danger)}
    @keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes toastOut{to{opacity:0;transform:translateY(-8px) scale(.95)}}

    /* ── مودال تأیید ── */
    .modal-overlay{
      display:none;position:fixed;inset:0;z-index:100;
      background:rgba(0,0,0,.3);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      place-items:center;
    }
    .modal-overlay.active{display:grid}
    .modal{
      background:var(--card);border:1px solid var(--line);
      border-radius:22px;padding:30px 26px 22px;
      max-width:360px;width:90%;box-shadow:var(--shadow-lg);
      text-align:center;animation:modalIn .3s cubic-bezier(.16,1,.3,1);
    }
    @keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(12px)}}
    .modal-icon{
      width:52px;height:52px;border-radius:16px;margin:0 auto 16px;
      background:#fef2f2;display:grid;place-items:center;color:var(--danger);
    }
    .modal h3{font-size:17px;font-weight:800;margin-bottom:8px}
    .modal p{color:var(--muted);font-size:13.5px;line-height:1.8;margin-bottom:22px}
    .modal-actions{display:flex;gap:10px}
    .modal-actions button{
      flex:1;padding:11px;border-radius:var(--radius-sm);
      font-family:inherit;font-size:13.5px;font-weight:600;
      cursor:pointer;border:1px solid var(--line);transition:all .15s ease;
    }
    .modal-actions button:active{transform:scale(.96)}
    .modal-actions button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    .btn-cancel{background:var(--card);color:var(--text)}
    .btn-cancel:hover{background:var(--bg2)}
    .btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
    .btn-danger:hover{background:#dc2626}

    /* ── جداکننده تاریخ ── */
    .date-sep{
      display:flex;align-items:center;gap:14px;margin:18px 0 12px;
      color:var(--muted);font-size:11.5px;font-weight:500;
    }
    .date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--line)}

    /* ── واکنش‌گرا ── */
    @media(max-width:640px){
      .brand-text .sub{display:none}
      .bubble{max-width:88%;font-size:14px}
      .composer{border-radius:14px;padding:5px 5px 5px 12px}
      .send{width:38px;height:38px;border-radius:10px}
      textarea{max-height:110px;font-size:14px}
      .suggestions{gap:8px}
      .sug-btn{padding:9px 14px;font-size:12.5px}
      .empty-card{padding:30px 22px;border-radius:20px}
      .empty-card h2{font-size:18px}
      .bg-blob{filter:blur(60px);opacity:.25}
    }

    @media(prefers-reduced-motion:reduce){
      .msg{animation:none;opacity:1;transform:none}
      .typing span{animation:none;opacity:.45}
      .modal{animation:none}
      .empty-card{animation:none}
      .bg-blob{animation:none}
      .toast{animation:none;opacity:1;transform:none}
    }
  </style>
</head>
<body>

  <!-- لایه‌های پس‌زمینه -->
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
  </div>

  <!-- نگهدارنده توست -->
  <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

  <div class="app">
    <!-- هدر -->
    <header>
      <div class="bar">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position:relative;z-index:1">
              <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
            </svg>
          </div>
          <div class="brand-text">
            <h1>دستیار هوشمند</h1>
            <p class="sub"><span class="pulse-dot" id="statusDot"></span>آنلاین</p>
          </div>
        </div>
        <div class="toolbar">
          <button class="iconbtn" id="clearBtn" title="پاک کردن گفتگو" aria-label="پاک کردن گفتگو">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- چت -->
    <main>
      <div class="chat" id="chat" role="log" aria-live="polite"></div>
    </main>

    <!-- نویسنده -->
    <footer>
      <form class="composer" id="composerForm" onsubmit="return false;">
        <textarea id="input" rows="1" placeholder="پیامت را بنویس..." autofocus aria-label="متن پیام"></textarea>
        <button class="send" id="sendBtn" type="submit" title="ارسال" aria-label="ارسال پیام">
          <svg id="sendIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(180deg);position:relative;z-index:1">
            <path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>
          </svg>
          <svg id="stopIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none;position:relative;z-index:1">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
      </form>
      <div class="hint">
        <span>Enter ارسال · Shift+Enter خط جدید</span>
        <span id="statusText">آماده</span>
      </div>
    </footer>
  </div>

  <!-- مودال تأیید -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </div>
      <h3 id="modalTitle">پاک کردن گفتگو</h3>
      <p>تمام پیام‌ها حذف خواهند شد. این عمل قابل بازگشت نیست.</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancel">انصراف</button>
        <button class="btn-danger" id="modalConfirm">پاک کردن</button>
      </div>
    </div>
  </div>

  <script>
    /* ── عناصر ── */
    const chatEl       = document.getElementById('chat');
    const inputEl       = document.getElementById('input');
    const sendBtn       = document.getElementById('sendBtn');
    const sendIcon      = document.getElementById('sendIcon');
    const stopIcon      = document.getElementById('stopIcon');
    const clearBtn      = document.getElementById('clearBtn');
    const statusText    = document.getElementById('statusText');
    const statusDot     = document.getElementById('statusDot');
    const modalOverlay  = document.getElementById('modalOverlay');
    const modalCancel   = document.getElementById('modalCancel');
    const modalConfirm  = document.getElementById('modalConfirm');
    const toastWrap     = document.getElementById('toastWrap');

    const STORAGE_KEY = 'ai_chat_history_v3';
    const API_URL     = '/v1/chat/completions';
    const API_KEY     = 'freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';

    let messages    = [];
    let busy        = false;
    let typingNode  = null;
    let abortCtrl   = null;  /* برای توقف درخواست */

    /* ── ابزارها ── */
    function nowFa() {
      return new Intl.DateTimeFormat('fa-IR', { hour: '2-digit', minute: '2-digit' }).format(new Date());
    }
    function todayFa() {
      return new Intl.DateTimeFormat('fa-IR', { weekday: 'long', day: 'numeric', month: 'long' }).format(new Date());
    }
    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages)); }
    function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } }
    function scrollBottom() { requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight; }); }
    function setStatus(t, online) {
      statusText.textContent = t;
      if (online === false) statusDot.classList.add('offline');
      else statusDot.classList.remove('offline');
    }
    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    }

    /* ── توست ── */
    function showToast(text, type) {
      type = type || 'success';
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      const iconSvg = type === 'success'
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
      t.innerHTML = '<span class="toast-icon">' + iconSvg + '</span>' + escapeHtml(text);
      toastWrap.appendChild(t);
      setTimeout(() => {
        t.classList.add('out');
        t.addEventListener('animationend', () => t.remove());
      }, 2200);
    }

    /* ── کپی متن ── */
    async function copyText(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
        btn.classList.add('copied');
        btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>کپی شد';
        showToast('متن کپی شد', 'success');
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = copyBtnHTML;
        }, 1800);
      } catch {
        showToast('خطا در کپی', 'error');
      }
    }
    const copyBtnHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>کپی';

    /* ── حالت خالی ── */
    function renderEmpty() {
      chatEl.innerHTML = '';
      const suggestions = [
        { text: 'یک برنامه تمرین هفتگی بنویس', label: 'برنامه تمرین هفتگی' },
        { text: 'یک داستان کوتاه درباره فضانوردی بنویس', label: 'داستان فضایی' },
        { text: 'چگونه می‌توانم برنامه‌نویسی یاد بگیرم؟', label: 'راهنمای برنامه‌نویسی' },
        { text: 'پنج ایده برای پروژه‌های خلاقانه بگو', label: 'ایده‌های خلاقانه' },
      ];
      chatEl.innerHTML = `
        <div class="empty" id="empty">
          <div class="empty-card">
            <div class="icon-hero">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
              </svg>
            </div>
            <h2>سلام! چی کمکت کنم؟</h2>
            <p>سؤال بپرس، متنی بنویس یا ایده‌ات رو شروع کن.<br>سریع و دقیق جواب می‌دم.</p>
          </div>
          <div class="suggestions">
            ${suggestions.map(s => `<button class="sug-btn" data-text="${escapeHtml(s.text)}"><span>${escapeHtml(s.label)}</span></button>`).join('')}
          </div>
        </div>`;
      chatEl.querySelectorAll('.sug-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          inputEl.value = btn.dataset.text;
          autoResize();
          sendMessage();
        });
      });
    }

    /* ── جداکننده تاریخ ── */
    function appendDateSep() {
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.textContent = todayFa();
      chatEl.appendChild(sep);
    }

    /* ── ساختار SVG آواتار ── */
    const avatarSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>';

    /* ── اضافه کردن پیام ── */
    function appendMessage(role, content, ts, animate) {
      if (animate === undefined) animate = true;
      ts = ts || nowFa();
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;
      if (!animate) { wrap.style.animation = 'none'; wrap.style.opacity = '1'; wrap.style.transform = 'none'; }

      const safe = escapeHtml(content);
      let actionsHTML = '';
      if (role === 'assistant') {
        actionsHTML = `<div class="msg-actions"><button class="msg-action" data-copy="${escapeHtml(content)}">${copyBtnHTML}</button></div>`;
      }

      if (role === 'assistant') {
        wrap.innerHTML = `
          <div class="avatar">${avatarSVG}</div>
          <div class="bubbleWrap">
            <div class="bubble" dir="auto">${safe}</div>
            ${actionsHTML}
            <div class="meta">هوش مصنوعی · ${ts}</div>
          </div>`;
      } else {
        wrap.innerHTML = `
          <div class="bubbleWrap">
            <div class="bubble" dir="auto">${safe}</div>
            <div class="meta">${ts} · شما</div>
          </div>`;
      }

      /* رویداد کپی */
      const copyBtn = wrap.querySelector('[data-copy]');
      if (copyBtn) {
        copyBtn.addEventListener('click', function() { copyText(this.dataset.copy, this); });
      }

      chatEl.appendChild(wrap);
      scrollBottom();
      return wrap.querySelector('.bubble');
    }

    /* ── نشانگر تایپ ── */
    function typingIndicator() {
      const msg = document.createElement('div');
      msg.className = 'msg assistant';
      msg.innerHTML = `
        <div class="avatar">${avatarSVG}</div>
        <div class="bubbleWrap">
          <div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>
          <div class="meta">در حال نوشتن...</div>
        </div>`;
      chatEl.appendChild(msg);
      scrollBottom();
      return msg;
    }

    /* ── تایپ تدریجی ── */
    async function typeOut(el, text) {
      el.textContent = '';
      el.dir = 'auto';
      const chars = [...text];
      const len = chars.length;
      /* سرعت متغیر: سریع‌تر برای متن‌های طولانی */
      const baseDelay = len > 300 ? 5 : len > 150 ? 8 : 12;
      for (let i = 0; i < len; i++) {
        if (abortCtrl && abortCtrl.signal.aborted) break;
        el.textContent += chars[i];
        if (i % 4 === 0) scrollBottom();
        /* مکث بعد از نقطه و ویرگول فارسی */
        const ch = chars[i];
        if (ch === '.' || ch === '؟' || ch === '!' || ch === '،') {
          await new Promise(r => setTimeout(r, baseDelay * 4));
        } else {
          await new Promise(r => setTimeout(r, baseDelay));
        }
      }
      /* بروزرسانی دیتای کپی */
      const wrap = el.closest('.bubbleWrap');
      if (wrap) {
        const btn = wrap.querySelector('[data-copy]');
        if (btn) btn.dataset.copy = el.textContent;
      }
      scrollBottom();
    }

    /* ── تغییر حالت دکمه ارسال/توقف ── */
    function setSendMode(isStop) {
      if (isStop) {
        sendBtn.classList.add('stop');
        sendIcon.style.display = 'none';
        stopIcon.style.display = 'block';
        sendBtn.title = 'توقف';
        sendBtn.setAttribute('aria-label', 'توقف تولید');
      } else {
        sendBtn.classList.remove('stop');
        sendIcon.style.display = 'block';
        stopIcon.style.display = 'none';
        sendBtn.title = 'ارسال';
        sendBtn.setAttribute('aria-label', 'ارسال پیام');
      }
    }

    /* ── توقف تولید ── */
    function stopGeneration() {
      if (abortCtrl) abortCtrl.abort();
      if (typingNode) typingNode.remove();
      typingNode = null;
      busy = false;
      sendBtn.disabled = false;
      setSendMode(false);
      setStatus('متوقف شد');
      showToast('تولید متوقف شد', 'error');
      inputEl.focus();
    }

    /* ── ارسال پیام ── */
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || busy) return;

      const emptyEl = document.getElementById('empty');
      if (emptyEl) emptyEl.remove();

      if (messages.length === 0) appendDateSep();

      messages.push({ role: 'user', content: text });
      appendMessage('user', text);
      save();

      inputEl.value = '';
      autoResize();
      busy = true;
      sendBtn.disabled = false;
      setSendMode(true);
      setStatus('در حال پاسخ...');
      typingNode = typingIndicator();
      abortCtrl = new AbortController();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + API_KEY
          },
          body: JSON.stringify({ model: 'auto', messages: messages.map(m => ({ role: m.role, content: m.content })) }),
          signal: abortCtrl.signal
        });

        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (abortCtrl.signal.aborted) return;

        const content = data?.choices?.[0]?.message?.content || 'پاسخی دریافت نشد.';
        messages.push({ role: 'assistant', content });

        if (typingNode) typingNode.remove();
        typingNode = null;
        const bubble = appendMessage('assistant', '');
        await typeOut(bubble, content);

        if (!abortCtrl.signal.aborted) {
          save();
          setStatus('آماده', true);
        }
      } catch (e) {
        if (e.name === 'AbortError') return; /* توقف کاربر */
        if (typingNode) typingNode.remove();
        typingNode = null;
        showToast('خطا در ارتباط با سرور', 'error');
        setStatus('خطا', false);
      } finally {
        if (!abortCtrl || !abortCtrl.signal.aborted) {
          busy = false;
          setSendMode(false);
          inputEl.focus();
        }
      }
    }

    /* ── مودال ── */
    function showModal() { modalOverlay.classList.add('active'); modalCancel.focus(); }
    function hideModal() { modalOverlay.classList.remove('active'); clearBtn.focus(); }
    function clearChat() {
      messages = [];
      save();
      renderEmpty();
      setStatus('پاک شد', true);
      inputEl.focus();
    }

    /* ── رویدادها ── */
    inputEl.addEventListener('input', autoResize);

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (busy) return;
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', e => {
      e.preventDefault();
      if (busy) stopGeneration();
      else sendMessage();
    });

    clearBtn.addEventListener('click', () => {
      if (messages.length === 0) return;
      showModal();
    });

    modalCancel.addEventListener('click', hideModal);
    modalConfirm.addEventListener('click', () => { hideModal(); clearChat(); });
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) hideModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') hideModal(); });

    /* ── مقداردهی اولیه ── */
    messages = load();
    if (messages.length) {
      chatEl.innerHTML = '';
      appendDateSep();
      messages.forEach(m => appendMessage(m.role, m.content, undefined, false));
      setStatus('گفتگو بارگذاری شد', true);
      setTimeout(scrollBottom, 80);
    } else {
      renderEmpty();
    }
    autoResize();
    setTimeout(() => inputEl.focus(), 60);
  </script>
</body>
</html>
