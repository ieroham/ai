<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دستیار هوشمند</title>
    <style>
        @font-face {
            font-family: 'Vazirmatn';
            src: local('Vazirmatn');
        }
        
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #b8b8c8;
            --accent-start: #6366f1;
            --accent-end: #3b82f6;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f8f9ff;
                --bg-secondary: #ffffff;
                --bg-glass: rgba(255, 255, 255, 0.7);
                --text-primary: #1a1a2e;
                --text-secondary: #6b7280;
                --border-color: rgba(0, 0, 0, 0.1);
                --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            }
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, Vazirmatn, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1a3e 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .header {
            position: sticky;
            top: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-text-fill-color: white;
            color: white;
            font-size: 1.1rem;
        }
        
        .clear-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }
        
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            scroll-behavior: smooth;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-secondary);
            gap: 1rem;
        }
        
        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-glass);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border-color);
        }
        
        .empty-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .empty-subtitle {
            font-size: 0.95rem;
            max-width: 280px;
            line-height: 1.6;
        }
        
        .message {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            animation: fadeIn 0.3s ease-out;
            align-items: flex-start;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }
        
        .message.user .avatar {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
        }
        
        .message.ai .avatar {
            background: var(--bg-glass);
            color: var(--text-primary);
        }
        
        .message-content {
            max-width: 75%;
            padding: 1rem 1.25rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.7;
            position: relative;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
            border-bottom-right-radius: 4px;
            text-align: right;
        }
        
        .message.ai .message-content {
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
            text-align: right;
        }
        
        .message-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            opacity: 0.8;
        }
        
        .typing {
            display: flex;
            gap: 4px;
            padding: 1rem 1.25rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            align-items: center;
            height: 50px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-start);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .input-area {
            padding: 1rem 1.5rem 1.5rem;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
        }
        
        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 0.75rem;
            box-shadow: var(--shadow);
        }
        
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            max-height: 150px;
            min-height: 24px;
            padding: 0.25rem 0.5rem;
            outline: none;
            line-height: 1.5;
        }
        
        textarea::placeholder {
            color: var(--text-secondary);
        }
        
        .send-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }
        
        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .send-btn svg {
            width: 20px;
            height: 20px;
            color: white;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        
        @media (max-width: 640px) {
            .container {
                max-width: 100%;
            }
            
            .header {
                padding: 1rem;
            }
            
            .chat-body {
                padding: 1rem;
            }
            
            .message-content {
                max-width: 85%;
                font-size: 0.9rem;
            }
            
            .input-area {
                padding: 0.75rem 1rem 1rem;
            }
        }
        
        .cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">✨</div>
                <span>دستیار هوشمند</span>
            </div>
            <button class="clear-btn" onclick="clearChat()">پاک کردن گفتگو</button>
        </header>
        
        <main class="chat-body" id="chatBody">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">🤖</div>
                <div class="empty-title">سلام! چی کمکت کنم؟</div>
                <div class="empty-subtitle">می‌تونی هر سوالی ازم داری بپرسی. در خدمتم!</div>
            </div>
            <div id="messages"></div>
        </main>
        
        <footer class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    placeholder="پیام خود را بنویس..." 
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script>
        const chatBody = document.getElementById('chatBody');
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const emptyState = document.getElementById('emptyState');
        const sendBtn = document.getElementById('sendBtn');
        
        let isLoading = false;
        let conversationHistory = [];
        
        const API_KEY = 'freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
        
        function loadHistory() {
            const saved = localStorage.getItem('chatHistory');
            if (saved) {
                conversationHistory = JSON.parse(saved);
                if (conversationHistory.length > 0) {
                    emptyState.style.display = 'none';
                    conversationHistory.forEach(msg => {
                        if (msg.role !== 'system') {
                            addMessageToUI(msg.role === 'user' ? 'user' : 'ai', msg.content, false);
                        }
                    });
                }
            }
        }
        
        function saveHistory() {
            localStorage.setItem('chatHistory', JSON.stringify(conversationHistory));
        }
        
        function clearChat() {
            if (confirm('آیا مطمئنی می‌خوای گفتگو رو پاک کنی؟')) {
                conversationHistory = [];
                messagesContainer.innerHTML = '';
                emptyState.style.display = 'flex';
                localStorage.removeItem('chatHistory');
            }
        }
        
        function getPersianTime() {
            const now = new Date();
            return now.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
        }
        
        function addMessageToUI(role, content, animate = false) {
            emptyState.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            
            const contentDiv = document.createElement('div');
            
            const bubble = document.createElement('div');
            bubble.className = 'message-content';
            
            if (animate && role === 'ai') {
                bubble.classList.add('cursor');
                bubble.textContent = '';
            } else {
                bubble.textContent = content;
            }
            
            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = getPersianTime();
            
            contentDiv.appendChild(bubble);
            contentDiv.appendChild(time);
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            
            scrollToBottom();
            
            if (animate && role === 'ai') {
                return typeText(bubble, content);
            }
            
            return Promise.resolve();
        }
        
        async function typeText(element, text) {
            element.classList.add('cursor');
            for (let i = 0; i < text.length; i++) {
                element.textContent += text[i];
                scrollToBottom();
                await new Promise(resolve => setTimeout(resolve, 15));
            }
            element.classList.remove('cursor');
        }
        
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '🤖';
            
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            typingDiv.appendChild(avatar);
            typingDiv.appendChild(typing);
            messagesContainer.appendChild(typingDiv);
            scrollToBottom();
        }
        
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        function scrollToBottom() {
            chatBody.scrollTo({ top: chatBody.scrollHeight, behavior: 'smooth' });
        }
        
        function showError(message) {
            hideTyping();
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            messagesContainer.appendChild(errorDiv);
            scrollToBottom();
            setTimeout(() => errorDiv.remove(), 5000);
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isLoading) return;
            
            messageInput.value = '';
            autoResize(messageInput);
            messageInput.focus();
            
            conversationHistory.push({ role: 'user', content: text });
            await addMessageToUI('user', text);
            saveHistory();
            
            isLoading = true;
            sendBtn.disabled = true;
            showTyping();
            
            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'auto',
                        messages: conversationHistory
                    })
                });
                
                if (!response.ok) throw new Error('خطا در دریافت پاسخ');
                
                const data = await response.json();
                const aiMessage = data.choices[0].message.content;
                
                conversationHistory.push({ role: 'assistant', content: aiMessage });
                saveHistory();
                
                hideTyping();
                await addMessageToUI('ai', aiMessage, true);
                
            } catch (error) {
                showError('متأسفانه خطایی رخ داد. لطفاً دوباره تلاش کنید.');
                console.error(error);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
            }
        }
        
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            messageInput.focus();
        });
    </script>
</body>
</html>
