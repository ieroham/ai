<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>چت هوش مصنوعی</title>
<meta name="theme-color" content="#030617">
<style>
:root{--bg:#030617;--glass:rgba(255,255,255,0.06);--glass-2:rgba(255,255,255,0.08);--border:rgba(255,255,255,0.12);--text:#e8eaf0;--muted:#9aa3b2;--p1:#7c3aed;--p2:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:Vazirmatn,"IRANSansX",Tahoma,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent}
.bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(1200px 800px at 80% -10%,rgba(124,58,237,.15),transparent),radial-gradient(1000px 600px at -10% 110%,rgba(59,130,246,.15),transparent),#030617}
.bg::before,.bg::after{content:"";position:absolute;border-radius:50%;filter:blur(90px);opacity:.6}
.bg::before{width:420px;height:420px;top:-120px;right:-80px;background:radial-gradient(circle,rgba(124,58,237,.8),transparent 60%)}
.bg::after{width:380px;height:380px;bottom:-120px;left:-80px;background:radial-gradient(circle,rgba(59,130,246,.8),transparent 60%)}
.app{height:100dvh;max-width:920px;margin:0 auto;display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(7,10,20,.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.title{display:flex;align-items:center;gap:12px}.logo{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--p1),var(--p2));display:grid;place-items:center}
h1{font-size:18px;font-weight:700}header p{font-size:12px;color:var(--muted);margin-top:2px}
.actions{display:flex;gap:8px}.icon-btn{height:36px;padding:0 12px;display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--border);color:var(--text);border-radius:12px;cursor:pointer}
.chat{flex:1;overflow-y:auto;padding:22px 16px;scroll-behavior:smooth}
.msg{display:flex;margin:14px 0;animation:fade.3s}.msg.user{justify-content:flex-end}.msg.ai{justify-content:flex-start}
.bubble{max-width:min(78%,680px);padding:14px 16px;line-height:1.9;font-size:15px;white-space:pre-wrap;word-wrap:break-word}
.msg.user.bubble{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-radius:20px 20px 6px 20px}
.msg.ai.bubble{background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(16px);border-radius:20px 20px 20px 6px}
.bubble-content{min-height:1.5em}.bubble-actions{margin-top:8px;opacity:0;transition:.2s}.msg.ai.bubble:hover.bubble-actions{opacity:1}
.mini-copy{font-size:12px;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--border);padding:4px 8px;border-radius:8px;cursor:pointer}
.typing{display:flex;gap:4px;height:20px}.typing span{width:6px;height:6px;border-radius:50%;background:#a78bfa;animation:b.9s infinite}.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.input-area{position:sticky;bottom:0;padding:14px;background:linear-gradient(to top,rgba(3,6,23,.95),transparent)}
.input-wrap{display:flex;gap:10px;background:rgba(15,19,35,.9);border:1px solid var(--border);padding:8px 12px;border-radius:24px}
textarea{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:16px;resize:none;max-height:150px}
.send-btn{width:42px;height:42px;border-radius:50%;border:0;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;display:grid;place-items:center;cursor:pointer}
.send-btn:disabled{opacity:.5}.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(20,24,40,.9);padding:8px 14px;border-radius:10px;opacity:0;transition:.3s}.toast.show{opacity:1}
.welcome{margin:30px auto;text-align:center;padding:20px;background:var(--glass);border:1px solid var(--border);border-radius:20px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="app">
<header><div class="title"><div class="logo">✨</div><div><h1>چت هوش مصنوعی</h1><p>مدل: Auto</p></div></div>
<div class="actions"><button id="copyBtn" class="icon-btn">کپی</button><button id="clearBtn" class="icon-btn">پاک</button></div></header>
<main id="chat" class="chat"><div class="welcome"><h2>سلام! 👋</h2><p>بپرس، من با مدل Auto جواب میدم.</p></div></main>
<footer class="input-area"><div class="input-wrap"><textarea id="input" placeholder="بنویس..." rows="1"></textarea><button id="send" class="send-btn" disabled>➤</button></div></footer>
</div>
<div id="toast" class="toast"></div>
<script>
const chat=document.getElementById('chat'),input=document.getElementById('input'),sendBtn=document.getElementById('send');
const TARGET='https://freellmapi-production-3240.up.railway.app/v1/chat/completions';
const API_URL='https://corsproxy.io/?'+encodeURIComponent(TARGET);
const API_KEY='freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
let conversation=[{role:'system',content:'You are a helpful Persian assistant. Answer concisely in Persian.'}];
let streaming=false;
const toast=(m)=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)};

function msg(role,text=''){const w=document.createElement('div');w.className='msg '+role;const b=document.createElement('div');b.className='bubble';
if(role==='ai'){const c=document.createElement('div');c.className='bubble-content';c.textContent=text;b.appendChild(c);w._c=c;const a=document.createElement('div');a.className='bubble-actions';const cp=document.createElement('button');cp.className='mini-copy';cp.textContent='کپی';cp.onclick=()=>navigator.clipboard.writeText(c.textContent).then(()=>toast('کپی شد'));a.appendChild(cp);b.appendChild(a)}else{b.textContent=text}
w.appendChild(b);chat.appendChild(w);chat.scrollTop=chat.scrollHeight;return w}

function typing(w){const t=document.createElement('div');t.className='typing';t.innerHTML='<span></span><span></span>';w._c.appendChild(t);w._t=t}

async function send(){
 const txt=input.value.trim();if(!txt||streaming)return;
 document.querySelector('.welcome')?.remove();msg('user',txt);conversation.push({role:'user',content:txt});
 input.value='';sendBtn.disabled=true;streaming=true;const aw=msg('ai','');typing(aw);
 try{
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},body:JSON.stringify({model:'auto',messages:conversation,stream:true,temperature:0.7})});
  if(!r.ok)throw new Error();const rd=r.body.getReader();const dec=new TextDecoder();let buf='',out='',first=true;
  while(true){const {done,value}=await rd.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();
   for(const l of lines){if(!l.startsWith('data:'))continue;const d=l.slice(5).trim();if(d==='[DONE]')continue;try{const j=JSON.parse(d);const delta=j.choices?.[0]?.delta?.content||'';if(delta){if(first){aw._t?.remove();first=false}out+=delta;aw._c.textContent=out;chat.scrollTop=chat.scrollHeight}}catch{}}}
  conversation.push({role:'assistant',content:out});
 }catch(e){aw._t?.remove();aw._c.textContent='خطا در اتصال. پراکسی را چک کن.';aw._c.style.color='#f88'}
 finally{streaming=false;sendBtn.disabled=!input.value.trim();input.focus()}
}
input.oninput=()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,150)+'px';sendBtn.disabled=!input.value.trim()||streaming};
input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};
sendBtn.onclick=send;
document.getElementById('clearBtn').onclick=()=>{conversation=conversation.slice(0,1);chat.innerHTML='<div class="welcome"><h2>گفتگوی جدید</h2></div>';toast('پاک شد')};
document.getElementById('copyBtn').onclick=()=>{const last=[...conversation].reverse().find(m=>m.role==='assistant');if(last)navigator.clipboard.writeText(last.content).then(()=>toast('کپی شد'))};
</script>
</body>
</html>
