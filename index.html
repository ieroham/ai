<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>دستیار هوشمند</title>
<style>
:root{--bg:#0a0a12;--fg:#e8eaf6;--muted:#9aa0b4;--glass:rgba(255,255,255,.06);--glass-2:rgba(255,255,255,.08);--border:rgba(255,255,255,.12);--accent1:#7c3aed;--accent2:#3b82f6;--shadow:0 10px 30px rgba(0,0,0,.35)}
@media (prefers-color-scheme:light){:root{--bg:#f7f8fc;--fg:#0f172a;--muted:#5b647a;--glass:rgba(255,255,255,.7);--glass-2:rgba(255,255,255,.9);--border:rgba(0,0,0,.08);--shadow:0 10px 30px rgba(2,6,23,.08)}}
*{box-sizing:border-box}html,body{height:100%;margin:0;font-family:system-ui,Vazirmatn,sans-serif;background:var(--bg);color:var(--fg)}
body{display:flex;flex-direction:column;min-height:100dvh}
header{position:sticky;top:0;z-index:10;backdrop-filter:blur(14px);background:linear-gradient(180deg,var(--glass-2),transparent);border-bottom:1px solid var(--border)}
.head{max-width:820px;margin:auto;display:flex;align-items:center;gap:.75rem;padding:.9rem 1rem}
.logo{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:grid;place-items:center;box-shadow:var(--shadow)}
.logo svg{width:20px;height:20px;fill:#fff}
h1{font-size:1.05rem;margin:0;font-weight:800;letter-spacing:.2px}
main{flex:1;overflow:auto}
.chat{max-width:820px;margin:auto;padding:1rem;display:flex;flex-direction:column;gap:.85rem}
.bubble{display:flex;gap:.6rem;align-items:flex-end;animation:fade.28s ease}
.bubble.user{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:50%;flex:0 0 28px;display:grid;place-items:center;font-size:.72rem;background:var(--glass);border:1px solid var(--border);color:var(--muted)}
.msg{max-width:78%;padding:.78rem.95rem;border-radius:18px;line-height:1.8;box-shadow:var(--shadow);border:1px solid var(--border);white-space:pre-wrap;word-wrap:break-word}
.user.msg{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;border-bottom-right-radius:6px}
.ai.msg{background:var(--glass);backdrop-filter:blur(12px);border-bottom-left-radius:6px}
.time{display:block;margin-top:.4rem;font-size:.7rem;color:var(--muted);opacity:.9}
.typing{display:inline-flex;gap:4px}
.typing span{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6;animation:b 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-4px);opacity:1}}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
footer{position:sticky;bottom:0;background:linear-gradient(0deg,var(--glass-2),transparent);backdrop-filter:blur(14px);border-top:1px solid var(--border)}
.bar{max-width:820px;margin:auto;display:flex;gap:.6rem;padding:.8rem 1rem;align-items:flex-end}
textarea{flex:1;resize:none;max-height:160px;min-height:46px;padding:.8rem.95rem;border-radius:14px;border:1px solid var(--border);background:var(--glass);color:var(--fg);outline:none;line-height:1.7;font-family:inherit}
textarea:focus{border-color:color-mix(in oklab,var(--accent2),white 20%)}
.btn{width:46px;height:46px;border-radius:12px;border:1px solid var(--border);background:linear-gradient(135deg,var(--accent1),var(--accent2));display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow);flex:0 0 46px}
.btn svg{width:20px;height:20px;fill:#fff}
.btn.ghost{background:var(--glass);backdrop-filter:blur(10px)}
.btn.ghost svg{fill:var(--fg);opacity:.85}
.empty{margin:18vh auto 0;text-align:center;color:var(--muted)}
.empty.glass{display:inline-block;padding:1.1rem 1.4rem;border-radius:18px;background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(12px)}
@media (max-width:560px){.msg{max-width:86%}}
</style>
</head>
<body>
<header><div class="head"><div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-9.9 8.6 1 1 0 0 0 1.9.4A8 8 0 1 1 12 20a7.9 7.9 0 0 1-6.3-3.1 1 1 0 1 0-1.6 1.2A9.9 9.9 0 0 0 12 22 10 10 0 0 0 12 2zm-1 6a1 1 0 0 0-1 1v3H7a1 1 0 1 0 0 2h3v3a1 1 0 1 0 2 0v-3h3a1 1 0 1 0 0-2h-3V9a1 1 0 0 0-1-1z"/></svg></div><h1>دستیار هوشمند</h1></div></header>
<main><div id="chat" class="chat"></div><div id="empty" class="empty"><div class="glass">سلام! چی کمکت کنم؟</div></div></main>
<footer><div class="bar"><button id="clear" class="btn ghost" title="پاک کردن"><svg viewBox="0 0 24 24"><path d="M6 7h12v2H6zm2 3h8v8H8zm-1-6h10l-1 2H8z"/></svg></button><textarea id="input" placeholder="پیامتو بنویس... (Enter ارسال، Shift+Enter خط جدید)" rows="1"></textarea><button id="send" class="btn" title="ارسال"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button></div></footer>
<script>
const API_KEY='freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
const chatEl=document.getElementById('chat'),emptyEl=document.getElementById('empty'),input=document.getElementById('input'),sendBtn=document.getElementById('send'),clearBtn=document.getElementById('clear');
let messages=JSON.parse(localStorage.getItem('chat_history')||'[]');
const faTime=d=>d.toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'});
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function save(){localStorage.setItem('chat_history',JSON.stringify(messages))}
function render(){
  chatEl.innerHTML='';emptyEl.style.display=messages.length?'none':'block';
  messages.forEach(m=>{
    const w=document.createElement('div');w.className='bubble '+(m.role==='user'?'user':'ai');
    const av=document.createElement('div');av.className='avatar';av.textContent=m.role==='user'?'تو':'AI';
    const b=document.createElement('div');b.className='msg';b.innerHTML=esc(m.content).replace(/\n/g,'<br>')+`<span class="time">${m.time||''}</span>`;
    w.append(av,b);chatEl.append(w);
  });chatEl.scrollTo({top:chatEl.scrollHeight,behavior:'smooth'});
}
async function typeWrite(el,text,obj){
  el.innerHTML='';let i=0;return new Promise(r=>{const t=()=>{obj.content=text.slice(0,i);el.innerHTML=esc(obj.content).replace(/\n/g,'<br>')+`<span class="time">${obj.time}</span>`;i++;if(i<=text.length){chatEl.scrollTo({top:chatEl.scrollHeight});requestAnimationFrame(t)}else{save();r()}};t()});
}
async function send(){
  const txt=input.value.trim();if(!txt)return;
  const u={role:'user',content:txt,time:faTime(new Date())};messages.push(u);save();render();input.value='';input.style.height='46px';input.focus();
  const typing=document.createElement('div');typing.className='bubble ai';typing.id='typing';typing.innerHTML='<div class="avatar">AI</div><div class="msg"><span class="typing"><span></span><span></span></span></div>';chatEl.append(typing);chatEl.scrollTo({top:chatEl.scrollHeight});
  try{
    const res=await fetch('/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},body:JSON.stringify({model:'auto',messages:messages.map(({role,content})=>({role:role==='assistant'?'assistant':role,content}))})});
    if(!res.ok)throw new Error(res.status);
    const data=await res.json();const reply=data.choices?.[0]?.message?.content||'پاسخی دریافت نشد.';
    typing.remove();const a={role:'assistant',content:'',time:faTime(new Date())};messages.push(a);save();render();const last=chatEl.lastElementChild.querySelector('.msg');await typeWrite(last,reply,a);
  }catch(e){typing.remove();const err={role:'assistant',content:'خطا در اتصال. دوباره تلاش کن.',time:faTime(new Date())};messages.push(err);save();render()}
}
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
sendBtn.onclick=send;clearBtn.onclick=()=>{if(confirm('گفتگو پاک شود؟')){messages=[];save();render();input.focus()}};
input.addEventListener('input',()=>{input.style.height='46px';input.style.height=Math.min(input.scrollHeight,160)+'px'});
render();input.focus();
</script>
</body>
</html>
