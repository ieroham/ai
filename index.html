<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>چت FreeLLM</title>
<style>
*{box-sizing:border-box;font-family:Vazirmatn, Tahoma, sans-serif}
body{margin:0;background:#0f172a;color:#e2e8f0;display:flex;justify-content:center;min-height:100vh}
.container{width:100%;max-width:720px;display:flex;flex-direction:column;height:100vh;padding:16px}
h1{font-size:20px;text-align:center;margin:8px 0 16px;color:#38bdf8}
#chat{flex:1;overflow-y:auto;background:#1e293b;border-radius:12px;padding:12px;margin-bottom:12px;border:1px solid #334155}
.msg{margin:8px 0;padding:10px 12px;border-radius:10px;line-height:1.7;white-space:pre-wrap}
.user{background:#0ea5e9;color:#fff;margin-right:20%}
.bot{background:#334155;margin-left:20%}
.input-row{display:flex;gap:8px}
#input{flex:1;padding:12px;border-radius:10px;border:1px solid #334155;background:#0b1220;color:#e2e8f0;outline:none}
#send{padding:12px 18px;border:none;border-radius:10px;background:#0ea5e9;color:#fff;cursor:pointer;font-weight:bold}
#send:disabled{opacity:.6;cursor:not-allowed}
</style>
</head>
<body>
<div class="container">
  <h1>چت با FreeLLM API</h1>
  <div id="chat"></div>
  <div class="input-row">
    <input id="input" placeholder="پیام خود را بنویسید..." autocomplete="off">
    <button id="send">ارسال</button>
  </div>
</div>
<script>
const chat=document.getElementById('chat');
const input=document.getElementById('input');
const sendBtn=document.getElementById('send');

function addMsg(text,cls){const d=document.createElement('div');d.className='msg '+cls;d.textContent=text;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}

async function send(){
  const text=input.value.trim();
  if(!text) return;
  addMsg(text,'user');
  input.value='';
  sendBtn.disabled=true;
  try{
    const res=await fetch('/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d'
      },
      body:JSON.stringify({
        model:"auto",
        messages:[{role:"user",content:text}]
      })
    });
    const data=await res.json();
    const reply=data?.choices?.[0]?.message?.content || 'پاسخی دریافت نشد';
    addMsg(reply,'bot');
  }catch(e){
    addMsg('خطا در ارتباط با سرور','bot');
  }finally{
    sendBtn.disabled=false;
    input.focus();
  }
}
sendBtn.onclick=send;
input.addEventListener('keydown',e=>{if(e.key==='Enter')send()});
</script>
</body>
</html>
