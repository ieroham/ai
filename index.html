<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>دستیار هوشمند</title>
<style>
:root{
  --bg:#070b16; --bg2:#0b1224; --text:#e8ecf8; --muted:#9aa4b2;
  --glass:rgba(255,255,255,.06); --border:rgba(255,255,255,.12);
  --u1:#7c3aed; --u2:#3b82f6; --ai:#0f172a; --shadow:0 12px 40px rgba(0,0,0,.45);
}
@media (prefers-color-scheme: light){
  :root{ --bg:#f6f7fb; --bg2:#ffffff; --text:#0b1220; --muted:#667085; --glass:rgba(255,255,255,.75); --border:rgba(2,6,23,.08); --ai:#ffffff; --shadow:0 12px 30px rgba(2,6,23,.08); }
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:system-ui, Vazirmatn, -apple-system, Segoe UI, Roboto, sans-serif; color:var(--text);
  background:
    radial-gradient(1200px 800px at 80% -10%, rgba(124,58,237,.25), transparent 60%),
    radial-gradient(900px 600px at -10% 20%, rgba(59,130,246,.22), transparent 55%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  display:flex; flex-direction:column; min-height:100dvh;
}
header{
  position:sticky; top:0; z-index:10; backdrop-filter:saturate(140%) blur(14px);
  background:linear-gradient(180deg, rgba(0,0,0,.35), transparent), var(--glass);
  border-bottom:1px solid var(--border);
}
.head{
  max-width:900px; margin:auto; padding:14px 16px; display:flex; align-items:center; gap:12px;
}
.logo{
  width:36px; height:36px; border-radius:12px; background:linear-gradient(135deg,var(--u1),var(--u2));
  box-shadow:var(--shadow); display:grid; place-items:center; color:white; font-weight:700;
}
.title{font-weight:700; letter-spacing:.2px}
.sub{color:var(--muted); font-size:12px; margin-top:2px}
main{
  flex:1; width:100%; max-width:900px; margin:0 auto; padding:18px 12px 110px; display:flex; flex-direction:column; gap:14px;
}
.empty{
  margin:auto; text-align:center; padding:40px 20px; border:1px dashed var(--border); border-radius:20px;
  background:var(--glass); backdrop-filter:blur(10px); max-width:560px;
}
.empty h2{margin:0 0 8px; font-size:20px}
.empty p{margin:0; color:var(--muted)}
.msg{
  display:flex; gap:10px; align-items:flex-end; animation:fade.28s ease;
}
.msg.ai{justify-content:flex-start}
.msg.user{justify-content:flex-end}
.bubble{
  max-width:min(78%, 620px); padding:12px 14px; border-radius:18px; line-height:1.9; font-size:15px;
  box-shadow:var(--shadow); border:1px solid var(--border); position:relative; word-wrap:break-word; white-space:pre-wrap;
}
.user.bubble{
  background:linear-gradient(135deg, var(--u1), var(--u2)); color:white; border:none; border-bottom-right-radius:6px;
}
.ai.bubble{
  background:var(--glass); backdrop-filter:blur(12px) saturate(140%); border-bottom-left-radius:6px;
}
.avatar{
  width:28px; height:28px; border-radius:50%; display:grid; place-items:center; font-size:12px; color:white; flex:0 0 28px;
  background:linear-gradient(135deg,#64748b,#334155); opacity:.9;
}
.user.avatar{background:linear-gradient(135deg,var(--u2),var(--u1))}
.meta{display:flex; gap:8px; align-items:center; margin-top:6px; color:var(--muted); font-size:11px}
.typing{display:inline-flex; gap:4px; align-items:center}
.dot{width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.6; animation:b 1.2s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes b{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
@keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
footer{
  position:fixed; bottom:0; inset-inline:0; background:linear-gradient(180deg, transparent, rgba(0,0,0,.25)), var(--glass);
  backdrop-filter:blur(14px) saturate(140%); border-top:1px solid var(--border);
}
.bar{max-width:900px; margin:auto; padding:10px 12px 14px; display:flex; gap:8px; align-items:flex-end}
textarea{
  flex:1; resize:none; max-height:160px; min-height:48px; padding:12px 14px; border-radius:14px; border:1px solid var(--border);
  background:var(--bg2); color:var(--text); outline:none; line-height:1.8; font-size:15px;
}
textarea::placeholder{color:var(--muted)}
.btn{
  width:44px; height:44px; border-radius:12px; border:1px solid var(--border); background:var(--glass); display:grid; place-items:center;
  cursor:pointer; transition:transform.08s ease; backdrop-filter:blur(8px);
}
.btn:active{transform:scale(.97)}
.btn.send{background:linear-gradient(135deg,var(--u1),var(--u2)); border:none; color:white}
.hint{max-width:900px; margin:4px auto 0; padding:0 14px 10px; color:var(--muted); font-size:11px}
.error{border-color:#ef4444!important}
.sr{position:absolute; width:1px; height:1px; overflow:hidden}
@media (max-width:560px){.bubble{max-width:86%} header.sub{display:none} }
</style>
</head>
<body>
<header>
  <div class="head">
    <div class="logo">ه‍</div>
    <div>
      <div class="title">دستیار هوشمند</div>
      <div class="sub">سریع، مینیمال، امن</div>
    </div>
  </div>
</header>

<main id="chat">
  <div class="empty" id="empty">
    <h2>سلام! چی کمکت کنم؟</h2>
    <p>پیامت رو بنویس، با Enter ارسال میشه. Shift+Enter برای خط جدید.</p>
  </div>
</main>

<footer>
  <div class="bar">
    <button class="btn" id="clear" title="پاک کردن گفتگو" aria-label="پاک کردن">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2m-9 0l1 12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <textarea id="input" placeholder="بنویس..." rows="1"></textarea>
    <button class="btn send" id="send" title="ارسال" aria-label="ارسال">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 12l15-7-6 7 6 7-15-7z" fill="currentColor"/></svg>
    </button>
  </div>
  <div class="hint">مدل: auto • از طریق پروکسی امن داخلی</div>
</footer>

<script>
const API_KEY = 'freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
const MODEL = 'auto';
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const clearBtn = document.getElementById('clear');
const empty = document.getElementById('empty');

let history = JSON.parse(localStorage.getItem('ai_history_v1') || '[]');

function save(){ localStorage.setItem('ai_history_v1', JSON.stringify(history)); }
function faTime(){ return new Date().toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'}); }
function scrollDown(){ window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'}); }

function el(tag, cls, html){ const e=document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; }

function renderMsg(m, animate=false){
  const wrap = el('div', 'msg '+m.role);
  const av = el('div','avatar', m.role==='user'? 'ت' : 'ه‍');
  const bub = el('div','bubble');
  const meta = el('div','meta', <span>${faTime()}</span>);
  if(m.role==='ai') wrap.appendChild(av);
  wrap.appendChild(bub);
  if(m.role==='user') wrap.appendChild(av);
  bub.appendChild(document.createTextNode(''));
  bub.appendChild(meta);
  chat.appendChild(wrap);
  if(animate && m.role==='ai'){ typeWriter(bub.firstChild, m.content); } else { bub.firstChild.nodeValue = m.content; }
  scrollDown();
}

function typeWriter(node, text){
  let i=0; const speed=12;
  const t = setInterval(()=>{ node.nodeValue = text.slice(0,i+=2); if(i>=text.length){ clearInterval(t); } }, speed);
}

function renderAll(){
  chat.innerHTML=''; chat.appendChild(empty);
  if(history.length){ empty.style.display='none'; history.forEach(m=>renderMsg(m)); }
  else { empty.style.display='block'; }
}

function typingOn(){
  const wrap = el('div','msg ai'); wrap.id='typing';
  const av = el('div','avatar','ه‍');
  const bub = el('div','bubble'); bub.innerHTML = '<span class="typing"><i class="dot"></i><i class="dot"></i><i class="dot"></i></span>';
  wrap.appendChild(av); wrap.appendChild(bub); chat.appendChild(wrap); scrollDown();
}
function typingOff(){ const t=document.getElementById('typing'); if(t) t.remove(); }

async function send(){
  const text = input.value.trim(); if(!text) return;
  input.value=''; input.style.height='48px'; input.focus();
  empty.style.display='none';
  const userMsg = {role:'user', content:text};
  history.push(userMsg); save(); renderMsg(userMsg);
  typingOn();
  try{
    const messages = history.map(h=>({role:h.role==='ai'?'assistant':h.role, content:h.content}));
    const res = await fetch('/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
      body: JSON.stringify({model:MODEL, messages})
    });
    if(!res.ok) throw new Error('خطای سرور '+res.status);
    const data = await res.json();
    const reply = (data?.choices?.?.message?.content) || (data?.choices?.message?.content) || 'پاسخی دریافت نشد.';
    typingOff();
    const aiMsg = {role:'ai', content: reply};
    history.push(aiMsg); save(); renderMsg(aiMsg, true);
  }catch(err){
    typingOff();
    const aiMsg = {role:'ai', content:'متأسفم، خطا پیش آمد. دوباره تلاش کن.'};
    history.push(aiMsg); save(); renderMsg(aiMsg);
    console.error(err);
  }
}[0]

function autoResize(){ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,160)+'px'; }

sendBtn.onclick = send;
input.addEventListener('keydown', e=>{ if(e.key==='Enter' &&!e.shiftKey){ e.preventDefault(); send(); } });
input.addEventListener('input', autoResize);
clearBtn.onclick = ()=>{ history=[]; save(); renderAll(); input.focus(); };

renderAll(); input.focus();
</script>
</body>
</html>
