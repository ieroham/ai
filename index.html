<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <meta name="theme-color" content="#0b1020" />
  <title>دستیار هوشمند</title>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
  <style>
    :root{
      --bg:#070c18;
      --bg2:#0d1429;
      --card:rgba(20, 27, 50, 0.55);
      --line:rgba(255,255,255,.08);
      --text:#eef3ff;
      --muted:#8893b8;
      --accent:#8b5cf6;
      --accent2:#22d3ee;
      --good:#60a5fa;
      --danger:#fb7185;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --radius:22px;
      --blur:20px;
    }
    @media (prefers-color-scheme: light){
      :root{
        --bg:#eef2fb;
        --bg2:#f7faff;
        --card:rgba(255,255,255,.75);
        --line:rgba(20,30,60,.08);
        --text:#0d1730;
        --muted:#52607e;
        --shadow:0 16px 40px rgba(43,67,120,.1);
      }
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'Vazirmatn', system-ui, sans-serif;
      color:var(--text);
      background:var(--bg);
      overflow:hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.18), transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(34, 211, 238, 0.12), transparent 40%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }
    .app{height:100%;display:flex;flex-direction:column}
    
    /* Header */
    header{
      position:sticky;top:0;z-index:10;
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      background:linear-gradient(180deg, rgba(10,16,32,.7), rgba(10,16,32,.3));
      border-bottom:1px solid var(--line);
      padding:14px 16px;
    }
    @media (prefers-color-scheme: light){
      header{background:linear-gradient(180deg, rgba(247,250,255,.85), rgba(247,250,255,.5))}
    }
    .bar{
      max-width:900px;margin:0 auto;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{
      width:44px;height:44px;border-radius:14px;flex:0 0 auto;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 8px 20px rgba(139,92,246,.3);
      display:grid;place-items:center;
      color:#fff;
    }
    .brand h1{margin:0;font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand p{margin:3px 0 0;color:var(--muted);font-size:12px;font-weight:500}
    .toolbar{display:flex;gap:8px;flex:0 0 auto}
    .iconbtn{
      border:1px solid var(--line);background:var(--card);color:var(--text);
      width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
      box-shadow:var(--shadow);cursor:pointer;
      transition: all 0.2s ease;
    }
    .iconbtn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }
    
    /* Main Chat */
    main{
      flex:1;min-height:0;
      max-width:900px;width:100%;
      margin:0 auto;
      display:flex;flex-direction:column;
      padding:14px 12px 10px;
    }
    .chat{
      flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
      padding:4px 4px 18px;
      scroll-behavior:smooth;
    }
    .chat::-webkit-scrollbar { width: 6px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
    
    /* Empty State */
    .empty{
      min-height:100%;
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      text-align:center;padding:20px;
    }
    .empty .box{
      max-width:420px;
      background:var(--card);border:1px solid var(--line);
      border-radius:24px;padding:32px 24px;
      backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }
    .empty h2{margin:0 0 12px;color:var(--text);font-size:22px;font-weight:700}
    .empty p{margin:0;line-height:1.8;color:var(--muted)}
    .suggestions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .suggestion-btn {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 16px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(var(--blur));
      transition: all 0.2s ease;
    }
    .suggestion-btn:hover {
      border-color: var(--accent);
      background: rgba(139, 92, 246, 0.1);
    }

    /* Messages */
    .msg{
      display:flex;gap:10px;align-items:flex-start;
      margin:14px 0;opacity:0;transform:translateY(10px);
      animation:fadeIn .4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
    .msg.user{justify-content:flex-end}
    .msg.assistant{justify-content:flex-start}
    
    .bubble{
      max-width:min(82%, 680px);
      padding:12px 16px;
      border-radius:18px;
      line-height:1.8;
      white-space:pre-wrap;
      word-break:break-word;
      border:1px solid var(--line);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      font-size:14.5px;
    }
    .user .bubble{
      background:linear-gradient(135deg, var(--accent), #6d28d9);
      color:#fff;border-color:transparent;
      border-bottom-right-radius:4px;
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.25);
    }
    .assistant .bubble{
      background:var(--card);
      color:var(--text);
      border-bottom-left-radius:4px;
    }
    .meta{
      font-size:10.5px;color:var(--muted);margin-top:6px;display:flex;gap:6px;align-items:center;justify-content:flex-end;
    }
    .user .meta { justify-content: flex-end; }
    .assistant .meta { justify-content: flex-start; }

    .avatar{
      width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto;
      background:rgba(255,255,255,.05);
      color:var(--accent2);
      border: 1px solid var(--line);
    }
    .assistant .avatar{order:1}
    .assistant .bubbleWrap{order:2}
    .user .avatar{display:none}
    
    /* Typing Indicator */
    .typing{
      display:inline-flex;gap:5px;align-items:center;min-width:34px;height:20px
    }
    .typing span{
      width:7px;height:7px;border-radius:50%;
      background:var(--muted);opacity:.5;
      animation:dot 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2){animation-delay:.15s}
    .typing span:nth-child(3){animation-delay:.3s}
    @keyframes dot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
    
    /* Footer Composer */
    footer{
      padding:10px 12px 14px;
      position:sticky;bottom:0;
      background:linear-gradient(180deg, transparent, var(--bg) 40%);
    }
    .composer{
      max-width:900px;margin:0 auto;
      background:var(--card);border:1px solid var(--line);
      border-radius:24px;padding:8px;
      display:flex;gap:8px;align-items:center;
      backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .composer:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15), var(--shadow);
    }
    textarea{
      flex:1;resize:none;border:0;outline:0;background:transparent;color:var(--text);
      font-family:inherit;font-size:14.5px;line-height:1.7;min-height:36px;max-height:160px;
      padding:8px 10px;direction:rtl;
    }
    textarea::placeholder{color:var(--muted)}
    .send{
      width:44px;height:44px;border:0;border-radius:14px;cursor:pointer;
      display:grid;place-items:center;color:#fff;flex:0 0 auto;
      background:linear-gradient(135deg,var(--accent),#6d28d9);
      transition: transform 0.1s ease, opacity 0.2s ease;
    }
    .send:active { transform: scale(0.95); }
    .send:disabled{opacity:.4;cursor:not-allowed;transform: none}
    
    .hint{
      max-width:900px;margin:8px auto 0;color:var(--muted);font-size:11.5px;padding:0 8px 2px;
      display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap
    }
    
    /* Toast & State */
    .state{display:none;position:absolute;inset:0;pointer-events:none;}
    .toast{
      margin:10px auto 0;width:max-content;max-width:90%;
      background:rgba(251,113,133,.14);border:1px solid rgba(251,113,133,.3);
      color:#fff;padding:8px 14px;border-radius:999px;font-size:13px;
    }
    
    @media (max-width:640px){
      .brand p{display:none}
      .bubble{max-width:90%}
      .composer{padding:6px;border-radius:20px}
      .send{width:40px;height:40px;border-radius:12px}
      textarea{max-height:120px;font-size:14px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="bar">
        <div class="brand">
          <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
            </svg>
          </div>
          <div>
            <h1>دستیار هوشمند</h1>
            <p>چت مدرن هوش مصنوعی</p>
          </div>
        </div>
        <div class="toolbar">
          <button class="iconbtn" id="clearBtn" title="پاک کردن گفتگو" aria-label="پاک کردن گفتگو">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main>
      <div class="chat" id="chat"></div>
      <div class="state" id="state"></div>
    </main>

    <footer>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="پیامت را بنویس..." autofocus></textarea>
        <button class="send" id="sendBtn" title="ارسال" aria-label="ارسال">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(180deg);">
            <path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>
          </svg>
        </button>
      </div>
      <div class="hint">
        <span>Enter برای ارسال • Shift+Enter برای خط جدید</span>
        <span id="statusText">آماده</span>
      </div>
    </footer>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const stateEl = document.getElementById('state');
    const statusText = document.getElementById('statusText');
    const STORAGE_KEY = 'ai_chat_history_v1';
    const API_URL = '/v1/chat/completions';
    const API_KEY = 'freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
    let messages = [];
    let busy = false;
    let typingNode = null;

    function nowFa() {
      return new Intl.DateTimeFormat('fa-IR', { hour:'2-digit', minute:'2-digit' }).format(new Date());
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    }
    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function scrollBottom() {
      requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight; });
    }
    function setStatus(text) { statusText.textContent = text; }
    
    function renderEmpty() {
      chatEl.innerHTML = `
        <div class="empty" id="empty">
          <div class="box">
            <h2>سلام! چی کمکت کنم؟</h2>
            <p>می‌تونی سؤال بپرسی، متن بنویسی یا یک ایده را شروع کنی. من جواب را سریع و تمیز برات می‌سازم.</p>
          </div>
          <div class="suggestions">
            <button class="suggestion-btn" data-text="یک برنامه تمرین هفتگی بنویس">💪 برنامه تمرین هفتگی</button>
            <button class="suggestion-btn" data-text="یک داستان کوتاه درباره فضانوردی بنویس">🚀 داستان فضایی</button>
            <button class="suggestion-btn" data-text="چگونه می‌توانم برنامه‌نویسی یاد بگیرم؟">💻 راهنمای برنامه‌نویسی</button>
          </div>
        </div>`;
        
      document.querySelectorAll('.suggestion-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          inputEl.value = btn.dataset.text;
          autoResize();
          sendMessage();
        });
      });
    }
    
    function clearState() { stateEl.innerHTML = ''; stateEl.style.display = 'none'; }
    function showError(text) {
      stateEl.style.display = 'block';
      stateEl.innerHTML = `<div class="toast">${text}</div>`;
      setTimeout(clearState, 3000);
    }
    
    function appendMessage(role, content, ts = nowFa()) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      
      const safeContent = escapeHtml(content);
      
      wrap.innerHTML = role === 'assistant' ? `
        <div class="avatar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
          </svg>
        </div>
        <div class="bubbleWrap">
          <div class="bubble" dir="auto">${safeContent}</div>
          <div class="meta">هوش مصنوعی • ${ts}</div>
        </div>` : `
        <div class="bubbleWrap">
          <div class="bubble" dir="auto">${safeContent}</div>
          <div class="meta">${ts} • شما</div>
        </div>`;
      chatEl.appendChild(wrap);
      scrollBottom();
      return wrap.querySelector('.bubble');
    }
    
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }
    
    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    }
    
    function getPayload() {
      return messages.map(m => ({ role: m.role, content: m.content }));
    }
    
    function typingIndicator() {
      const msg = document.createElement('div');
      msg.className = 'msg assistant';
      msg.innerHTML = `
        <div class="avatar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
          </svg>
        </div>
        <div class="bubbleWrap">
          <div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>
          <div class="meta">در حال نوشتن...</div>
        </div>`;
      chatEl.appendChild(msg);
      scrollBottom();
      return msg;
    }
    
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || busy) return;
      if (document.getElementById('empty')) document.getElementById('empty').remove();
      
      messages.push({ role: 'user', content: text });
      appendMessage('user', text);
      save();
      inputEl.value = '';
      autoResize();
      busy = true;
      sendBtn.disabled = true;
      clearState();
      setStatus('در حال پاسخ...');
      typingNode = typingIndicator();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + API_KEY
          },
          body: JSON.stringify({ model: 'auto', messages: getPayload() })
        });
        const data = await res.json();
        const content = data?.choices?.[0]?.message?.content || 'پاسخی دریافت نشد.';
        messages.push({ role: 'assistant', content });
        
        if (typingNode) typingNode.remove();
        const bubble = appendMessage('assistant', '');
        await typeOut(bubble, content);
        save();
        setStatus('آماده');
      } catch (e) {
        if (typingNode) typingNode.remove();
        showError('خطا در ارتباط با سرور. دوباره تلاش کن.');
        setStatus('خطا');
      } finally {
        busy = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
    
    async function typeOut(el, text) {
      el.textContent = '';
      el.dir = 'auto'; // Auto-detect direction for typing
      const chars = [...text];
      for (let i = 0; i < chars.length; i++) {
        el.textContent += chars[i];
        if (i % 2 === 0) scrollBottom();
        await new Promise(r => setTimeout(r, 8)); // Slightly faster typing
      }
      scrollBottom();
    }
    
    function clearChat() {
      messages = [];
      save();
      chatEl.innerHTML = '';
      renderEmpty();
      setStatus('پاک شد');
      inputEl.focus();
    }

    // Event Listeners
    inputEl.addEventListener('input', autoResize);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    sendBtn.addEventListener('click', sendMessage);
    clearBtn.addEventListener('click', clearChat);

    // Initialize
    messages = load();
    if (messages.length) {
      chatEl.innerHTML = '';
      messages.forEach(m => appendMessage(m.role, m.content));
      setStatus('گفتگو بارگذاری شد');
    } else {
      renderEmpty();
    }
    autoResize();
    setTimeout(() => inputEl.focus(), 50);
  </script>
</body>
</html>
