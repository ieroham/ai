<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>چت هوش مصنوعی</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Vazirmatn,Tahoma,sans-serif;background:#030617;color:#e8eaf0;height:100dvh;display:flex;flex-direction:column}
header{padding:15px;background:rgba(10,15,30,.8);border-bottom:1px solid #222;text-align:center}
.chat{flex:1;overflow-y:auto;padding:16px;max-width:900px;width:100%;margin:0 auto}
.msg{display:flex;margin:10px 0}.msg.user{justify-content:flex-end}
.bubble{max-width:75%;padding:12px 16px;border-radius:18px;line-height:1.7;white-space:pre-wrap}
.user.bubble{background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff}
.ai.bubble{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
.input{display:flex;gap:8px;padding:12px;max-width:900px;width:100%;margin:0 auto}
textarea{flex:1;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:14px;padding:10px 14px;font-size:15px;resize:none;outline:none}
button{padding:0 20px;background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;border:0;border-radius:14px;cursor:pointer}
button:disabled{opacity:.5}
</style>
</head>
<body>
<header><h2>چت هوش مصنوعی ✨</h2></header>
<div id="chat" class="chat"></div>
<div class="input">
  <textarea id="inp" rows="1" placeholder="پیامت رو بنویس..."></textarea>
  <button id="send">ارسال</button>
</div>
<script>
const chat=document.getElementById('chat'),inp=document.getElementById('inp'),btn=document.getElementById('send');

const TARGET='https://freellmapi-production-3240.up.railway.app/v1/chat/completions';
const API='https://corsproxy.io/?'+encodeURIComponent(TARGET);
const KEY='freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';

let history=[{role:'system',content:'You are a helpful assistant. Answer in Persian.'}];

function add(role,text){
  const m=document.createElement('div');m.className='msg '+role;
  const b=document.createElement('div');b.className='bubble';b.textContent=text;
  m.appendChild(b);chat.appendChild(m);chat.scrollTop=chat.scrollHeight;return b;
}

async function send(){
  const txt=inp.value.trim();if(!txt)return;
  add('user',txt);history.push({role:'user',content:txt});
  inp.value='';btn.disabled=true;
  const bubble=add('ai','...');

  try{
    const res=await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
      body:JSON.stringify({model:'auto',messages:history,stream:false})
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||'پاسخی دریافت نشد';
    bubble.textContent=reply;
    history.push({role:'assistant',content:reply});
  }catch(err){
    bubble.textContent='خطا: '+err.message+' (VPN رو چک کن)';
  }
  btn.disabled=false;inp.focus();
}

inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=inp.scrollHeight+'px'});
btn.onclick=send;
inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};

add('ai','سلام! بپرس...');
</script>
</body>
</html>
