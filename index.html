<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دستیار هوشمند</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #ffffff;
                --bg-secondary: #f5f5f7;
                --text-primary: #000000;
                --text-secondary: #666666;
                --user-bubble: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                --ai-bubble: rgba(255, 255, 255, 0.1);
                --ai-bubble-border: rgba(100, 150, 200, 0.3);
                --header-bg: #ffffff;
                --input-bg: #f5f5f7;
                --input-border: #e0e0e0;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f0f1e;
                --bg-secondary: #1a1a2e;
                --text-primary: #ffffff;
                --text-secondary: #b0b0b0;
                --user-bubble: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                --ai-bubble: rgba(100, 150, 200, 0.1);
                --ai-bubble-border: rgba(100, 150, 200, 0.3);
                --header-bg: #1a1a2e;
                --input-bg: #16213e;
                --input-border: #2d3561;
            }
        }

        html {
            color-scheme: dark light;
        }

        body {
            font-family: system-ui, Vazirmatn, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background-color: var(--header-bg);
            padding: 16px 20px;
            border-bottom: 1px solid var(--input-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background-color: var(--input-bg);
            color: var(--text-primary);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 20px;
            text-align: center;
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 18px;
            color: var(--text-secondary);
        }

        .message-group {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-in;
            margin-bottom: 8px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-group.user {
            justify-content: flex-end;
        }

        .message-group.ai {
            justify-content: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .avatar.ai {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 70%;
        }

        .message-content.user {
            align-items: flex-end;
        }

        .message-content.ai {
            align-items: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .message-bubble.user {
            background: var(--user-bubble);
            color: #ffffff;
            border-radius: 16px 16px 4px 16px;
        }

        .message-bubble.ai {
            background: var(--ai-bubble);
            border: 1px solid var(--ai-bubble-border);
            color: var(--text-primary);
            border-radius: 16px 16px 16px 4px;
            backdrop-filter: blur(10px);
        }

        .message-time {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 0 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-secondary);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        .footer {
            padding: 16px 20px;
            background-color: var(--header-bg);
            border-top: 1px solid var(--input-border);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-textarea {
            flex: 1;
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            outline: none;
            transition: all 0.2s;
        }

        .input-textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn, .clear-input-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-input-btn {
            background: var(--input-bg);
            color: var(--text-secondary);
            border: 1px solid var(--input-border);
        }

        .clear-input-btn:hover {
            color: var(--text-primary);
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }

            .header-title {
                font-size: 16px;
            }

            .chat-container {
                padding: 12px;
            }

            .footer {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">🤖 دستیار هوشمند</div>
        <button class="clear-btn" id="clearBtn" title="پاک کردن گفتگو">🗑️</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="empty-state">
            <div class="empty-icon">👋</div>
            <div class="empty-text">سلام! چی کمکت کنم؟</div>
        </div>
    </div>

    <div class="footer">
        <div id="errorMessage"></div>
        <div class="input-wrapper">
            <textarea 
                id="messageInput" 
                class="input-textarea" 
                placeholder="پیامتو بنویس... (Enter برای ارسال، Shift+Enter برای خط جدید)"
                rows="1"
            ></textarea>
            <button class="clear-input-btn" id="clearInputBtn" title="پاک کردن">✕</button>
            <button class="send-btn" id="sendBtn" title="ارسال پیام">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const API_KEY = 'freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
        const API_ENDPOINT = '/v1/chat/completions';

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const clearInputBtn = document.getElementById('clearInputBtn');
        const errorMessage = document.getElementById('errorMessage');

        let messages = [];
        let isLoading = false;

        function loadChatHistory() {
            const saved = localStorage.getItem('chatHistory');
            if (saved) {
                try {
                    messages = JSON.parse(saved);
                    renderMessages();
                } catch (e) {
                    console.error('Failed to load chat history:', e);
                }
            }
        }

        function saveChatHistory() {
            localStorage.setItem('chatHistory', JSON.stringify(messages));
        }

        function formatPersianDate(date) {
            const options = { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: false
            };
            return date.toLocaleString('fa-IR', options);
        }

        function showError(message) {
            errorMessage.innerHTML = `<div class="error-message">❌ ${message}</div>`;
            setTimeout(() => {
                errorMessage.innerHTML = '';
            }, 5000);
        }

        function renderMessages() {
            if (messages.length === 0) {
                chatContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">👋</div>
                        <div class="empty-text">سلام! چی کمکت کنم؟</div>
                    </div>
                `;
                return;
            }

            chatContainer.innerHTML = '';
            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message-group ${msg.role}`;
                
                const timeStr = formatPersianDate(new Date(msg.timestamp));
                
                if (msg.role === 'user') {
                    msgDiv.innerHTML = `
                        <div class="message-content user">
                            <div class="message-bubble user">${escapeHtml(msg.content)}</div>
                            <div class="message-time">${timeStr}</div>
                        </div>
                    `;
                } else {
                    msgDiv.innerHTML = `
                        <div class="avatar ai">🤖</div>
                        <div class="message-content ai">
                            <div class="message-bubble ai">${escapeHtml(msg.content)}</div>
                            <div class="message-time">${timeStr}</div>
                        </div>
                    `;
                }
