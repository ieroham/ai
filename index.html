<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <meta name="theme-color" content="#0b1020" />
  <title>دستیار هوشمند</title>
  <style>
    :root{
      --bg:#08101f;
      --bg2:#0d1730;
      --card:rgba(14,20,40,.62);
      --line:rgba(255,255,255,.08);
      --text:#eef3ff;
      --muted:#9ba7c7;
      --accent:#8b5cf6;
      --accent2:#22d3ee;
      --good:#60a5fa;
      --danger:#fb7185;
      --shadow:0 20px 80px rgba(0,0,0,.35);
      --radius:22px;
      --blur:18px;
    }
    @media (prefers-color-scheme: light){
      :root{
        --bg:#eef4ff;
        --bg2:#f7faff;
        --card:rgba(255,255,255,.68);
        --line:rgba(20,30,60,.08);
        --text:#0d1730;
        --muted:#52607e;
        --shadow:0 16px 60px rgba(43,67,120,.12);
      }
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,Vazirmatn,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(139,92,246,.22), transparent 35%),
        radial-gradient(circle at top left, rgba(34,211,238,.18), transparent 30%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      overflow:hidden;
    }
    .app{height:100%;display:flex;flex-direction:column}
    header{
      position:sticky;top:0;z-index:10;
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      background:linear-gradient(180deg, rgba(10,16,32,.82), rgba(10,16,32,.45));
      border-bottom:1px solid var(--line);
      padding:14px 16px;
    }
    @media (prefers-color-scheme: light){
      header{background:linear-gradient(180deg, rgba(247,250,255,.88), rgba(247,250,255,.58))}
    }
    .bar{
      max-width:980px;margin:0 auto;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{
      width:42px;height:42px;border-radius:16px;flex:0 0 auto;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 10px 30px rgba(139,92,246,.35);
      position:relative;
    }
    .logo:before,.logo:after{
      content:"";position:absolute;inset:0;border-radius:16px;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.45), transparent 35%);
    }
    .brand h1{margin:0;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .toolbar{display:flex;gap:8px;flex:0 0 auto}
    .iconbtn{
      border:1px solid var(--line);background:var(--card);color:var(--text);
      width:42px;height:42px;border-radius:14px;display:grid;place-items:center;
      box-shadow:var(--shadow);cursor:pointer;
    }
    main{
      flex:1;min-height:0;
      max-width:980px;width:100%;
      margin:0 auto;
      display:flex;flex-direction:column;
      padding:14px 12px 10px;
    }
    .chat{
      flex:1;min-height:0;overflow:auto;
      padding:4px 2px 18px;
      scroll-behavior:smooth;
    }
    .empty{
      min-height:100%;
      display:grid;place-items:center;
      text-align:center;padding:28px 16px;
      color:var(--muted);
    }
    .empty .box{
      max-width:420px;
      background:var(--card);border:1px solid var(--line);
      border-radius:28px;padding:28px 22px;
      backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow);
    }
    .empty h2{margin:0 0 10px;color:var(--text);font-size:22px}
    .empty p{margin:0;line-height:1.8}
    .msg{
      display:flex;gap:10px;align-items:flex-end;
      margin:10px 0;opacity:0;transform:translateY(10px);
      animation:fadeIn .28s ease forwards;
    }
    @keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
    .msg.user{justify-content:flex-start;direction:rtl}
    .msg.assistant{justify-content:flex-end;direction:ltr}
    .bubble{
      max-width:min(82%, 720px);
      padding:14px 15px;
      border-radius:22px;
      line-height:1.9;
      white-space:pre-wrap;
      word-break:break-word;
      border:1px solid var(--line);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow);
      position:relative;
    }
    .user .bubble{
      background:linear-gradient(135deg, rgba(139,92,246,.95), rgba(34,211,238,.88));
      color:#fff;border-color:transparent;
      border-bottom-right-radius:8px;
    }
    .assistant .bubble{
      background:var(--card);
      color:var(--text);
      border-bottom-left-radius:8px;
    }
    .meta{
      font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:6px;align-items:center
    }
    .avatar{
      width:30px;height:30px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;
      background:linear-gradient(135deg, rgba(139,92,246,.95), rgba(34,211,238,.9));
      color:#fff;font-size:14px;
      box-shadow:0 8px 24px rgba(34,211,238,.18);
    }
    .assistant .avatar{order:2}
    .assistant .bubbleWrap{order:1}
    .user .avatar{display:none}
    .typing{
      display:inline-flex;gap:5px;align-items:center;min-width:34px;height:22px
    }
    .typing span{
      width:7px;height:7px;border-radius:50%;
      background:currentColor;opacity:.55;
      animation:dot 1.1s infinite ease-in-out;
    }
    .typing span:nth-child(2){animation-delay:.15s}
    .typing span:nth-child(3){animation-delay:.3s}
    @keyframes dot{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-5px);opacity:1}}
    footer{
      padding:10px 12px 14px;
      position:sticky;bottom:0;
      background:linear-gradient(180deg, transparent, rgba(0,0,0,.12) 25%, rgba(0,0,0,.22));
    }
    .composer{
      max-width:980px;margin:0 auto;
      background:var(--card);border:1px solid var(--line);
      border-radius:26px;padding:12px;
      display:flex;gap:10px;align-items:flex-end;
      backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow);
    }
    textarea{
      flex:1;resize:none;border:0;outline:0;background:transparent;color:var(--text);
      font:inherit;line-height:1.8;min-height:26px;max-height:160px;
      padding:8px 10px;direction:rtl;
    }
    textarea::placeholder{color:var(--muted)}
    .send{
      width:48px;height:48px;border:0;border-radius:18px;cursor:pointer;
      display:grid;place-items:center;color:#fff;flex:0 0 auto;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 12px 28px rgba(139,92,246,.28);
    }
    .send:disabled{opacity:.45;cursor:not-allowed}
    .clear{
      width:48px;height:48px;border-radius:18px;cursor:pointer;
      border:1px solid var(--line);background:transparent;color:var(--text);flex:0 0 auto;
    }
    .hint{
      max-width:980px;margin:8px auto 0;color:var(--muted);font-size:12px;padding:0 8px 2px;
      display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap
    }
    .state{
      display:none;
      position:absolute;inset:0;pointer-events:none;
    }
    .toast{
      margin:10px auto 0;
      width:max-content;max-width:90%;
      background:rgba(251,113,133,.14);
      border:1px solid rgba(251,113,133,.26);
      color:var(--text);
      padding:10px 14px;border-radius:999px;
    }
    @media (max-width:640px){
      .brand p{display:none}
      .bubble{max-width:88%}
      .composer{padding:10px;border-radius:22px}
      .send,.clear{width:44px;height:44px;border-radius:16px}
      textarea{max-height:140px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="bar">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1>دستیار هوشمند</h1>
            <p>چت مدرن هوش مصنوعی</p>
          </div>
        </div>
        <div class="toolbar">
          <button class="iconbtn" id="clearBtn" title="پاک کردن گفتگو" aria-label="پاک کردن گفتگو">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/><path d="M10 10v6M14 10v6"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main>
      <div class="chat" id="chat"></div>
      <div class="state" id="state"></div>
    </main>

    <footer>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="پیامت را بنویس..." autofocus></textarea>
        <button class="clear" id="clearBtn2" title="پاک کردن" aria-label="پاک کردن گفتگو">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/><path d="M10 10v6M14 10v6"/></svg>
        </button>
        <button class="send" id="sendBtn" title="ارسال" aria-label="ارسال">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/>
          </svg>
        </button>
      </div>
      <div class="hint">
        <span>Enter برای ارسال • Shift+Enter برای خط جدید</span>
        <span id="statusText">آماده</span>
      </div>
    </footer>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const clearBtn2 = document.getElementById('clearBtn2');
    const stateEl = document.getElementById('state');
    const statusText = document.getElementById('statusText');
    const STORAGE_KEY = 'ai_chat_history_v1';
    const API_URL = '/v1/chat/completions';
    const API_KEY = 'freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
    let messages = [];
    let busy = false;
    let typingNode = null;

    function nowFa() {
      return new Intl.DateTimeFormat('fa-IR', { hour:'2-digit', minute:'2-digit' }).format(new Date());
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    }
    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function scrollBottom() {
      requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight; });
    }
    function setStatus(text) { statusText.textContent = text; }
    function renderEmpty() {
      chatEl.innerHTML = `
        <div class="empty" id="empty">
          <div class="box">
            <h2>سلام! چی کمکت کنم؟</h2>
            <p>می‌تونی سؤال بپرسی، متن بنویسی یا یک ایده را شروع کنی. من جواب را سریع و تمیز برات می‌سازم.</p>
          </div>
        </div>`;
    }
    function clearState() { stateEl.innerHTML = ''; stateEl.style.display = 'none'; }
    function showError(text) {
      stateEl.style.display = 'block';
      stateEl.innerHTML = `<div class="toast">${text}</div>`;
      setTimeout(clearState, 3000);
    }
    function appendMessage(role, content, ts = nowFa()) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      wrap.innerHTML = role === 'assistant' ? `
        <div class="avatar">AI</div>
        <div class="bubbleWrap">
          <div class="bubble">${escapeHtml(content)}</div>
          <div class="meta">هوش مصنوعی • ${ts}</div>
        </div>` : `
        <div class="bubbleWrap">
          <div class="bubble">${escapeHtml(content)}</div>
          <div class="meta">${ts} • شما</div>
        </div>
        <div class="avatar">ش</div>`;
      chatEl.appendChild(wrap);
      scrollBottom();
      return wrap.querySelector('.bubble');
    }
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }
    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    }
    function getPayload() {
      return messages.map(m => ({ role: m.role, content: m.content }));
    }
    function typingIndicator() {
      const msg = document.createElement('div');
      msg.className = 'msg assistant';
      msg.innerHTML = `
        <div class="avatar">AI</div>
        <div class="bubbleWrap">
          <div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>
          <div class="meta">در حال نوشتن...</div>
        </div>`;
      chatEl.appendChild(msg);
      scrollBottom();
      return msg;
    }
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || busy) return;
      if (document.getElementById('empty')) document.getElementById('empty').remove();
      messages.push({ role: 'user', content: text });
      appendMessage('user', text);
      save();
      inputEl.value = '';
      autoResize();
      busy = true;
      sendBtn.disabled = true;
      clearState();
      setStatus('در حال پاسخ...');
      typingNode = typingIndicator();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + API_KEY
          },
          body: JSON.stringify({ model: 'auto', messages: getPayload() })
        });
        const data = await res.json();
        const content = data?.choices?.[0]?.message?.content || 'پاسخی دریافت نشد.';
        messages.push({ role: 'assistant', content });
        if (typingNode) typingNode.remove();
        const bubble = appendMessage('assistant', '');
        await typeOut(bubble, content);
        save();
        setStatus('آماده');
      } catch (e) {
        if (typingNode) typingNode.remove();
        showError('خطا در ارتباط با سرور. دوباره تلاش کن.');
        setStatus('خطا');
      } finally {
        busy = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
    async function typeOut(el, text) {
      el.textContent = '';
      const chars = [...text];
      for (let i = 0; i < chars.length; i++) {
        el.textContent += chars[i];
        if (i % 2 === 0) scrollBottom();
        await new Promise(r => setTimeout(r, 10));
      }
      scrollBottom();
    }
    function clearChat() {
      messages = [];
      save();
      chatEl.innerHTML = '';
      renderEmpty();
      setStatus('پاک شد');
      inputEl.focus();
    }

    inputEl.addEventListener('input', autoResize);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    sendBtn.addEventListener('click', sendMessage);
    clearBtn.addEventListener('click', clearChat);
    clearBtn2.addEventListener('click', clearChat);

    messages = load();
    if (messages.length) {
      chatEl.innerHTML = '';
      messages.forEach(m => appendMessage(m.role, m.content));
      setStatus('گفتگو بارگذاری شد');
    } else {
      renderEmpty();
    }
    autoResize();
    setTimeout(() => inputEl.focus(), 50);
  </script>
</body>
</html>
