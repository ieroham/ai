<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#08101f" />
  <title>دستیار هوشمند — AI Assistant</title>
  <style>
    :root{
      --midnight:#08101f; --midnight2:#0b1530; --cyan:#22d3ee; --violet:#8b5cf6;
      --bg:#050b18; --bg2:#0a1328; --card:rgba(14,22,44,.62); --card-2:rgba(18,26,52,.72);
      --line:rgba(255,255,255,.08); --text:#e8efff; --muted:#9aa7c7;
      --radius:20px; --blur:18px; --shadow:0 20px 70px rgba(0,0,0,.35);
      --glow-cyan:0 0 24px rgba(34,211,238,.35); --glow-violet:0 0 24px rgba(139,92,246,.35);
    }
    html.light{
      --bg:#eef4ff; --bg2:#f6f9ff; --card:rgba(255,255,255,.72); --card-2:rgba(255,255,255,.82);
      --line:rgba(15,23,42,.08); --text:#0b1530; --muted:#5b6885; --shadow:0 18px 50px rgba(30,60,120,.14);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--text); overflow:hidden;
      font-family:Vazirmatn,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,sans-serif;
      background:
        radial-gradient(1100px 700px at 90% -15%, rgba(139,92,246,.22), transparent 60%),
        radial-gradient(900px 600px at -10% 10%, rgba(34,211,238,.18), transparent 55%),
        linear-gradient(180deg,var(--bg),var(--bg2));
    }
   .app{height:100%; display:flex}
    html[dir="rtl"].app{flex-direction:row-reverse}

   .sidebar{
      width:310px; flex:0 0 310px; display:flex; flex-direction:column;
      background:linear-gradient(180deg, rgba(8,16,32,.85), rgba(8,16,32,.55));
      border-inline-end:1px solid var(--line); backdrop-filter:blur(var(--blur));
    }
   .side-head{padding:14px; display:flex; flex-direction:column; gap:10px; border-bottom:1px solid var(--line)}
   .brand{display:flex; align-items:center; gap:12px}
   .logo{width:44px; height:44px; border-radius:16px; position:relative; flex:0 0 auto;
      background:linear-gradient(135deg,var(--violet),var(--cyan)); box-shadow:var(--glow-violet)}
   .logo:after{content:""; position:absolute; inset:0; border-radius:16px;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.45), transparent 40%)}
   .brand h1{margin:0; font-size:17px; font-weight:700}
   .brand p{margin:2px 0 0; color:var(--muted); font-size:12px}
   .newchat{display:flex; align-items:center; gap:8px; width:100%; padding:11px 12px; cursor:pointer;
      border:1px solid var(--line); background:var(--card); color:var(--text);
      border-radius:14px; transition:.2s; box-shadow:var(--shadow)}
   .newchat:hover{transform:translateY(-1px); box-shadow:var(--glow-cyan)}
   .search{position:relative}
   .search input{width:100%; padding:10px 36px; border-radius:12px; border:1px solid var(--line);
      background:var(--card-2); color:var(--text); outline:none; font:inherit}
   .search svg{position:absolute; inset-block-start:50%; transform:translateY(-50%); inset-inline-start:10px; opacity:.7}
   .history{flex:1; min-height:0; overflow:auto; padding:10px}
   .h-item{display:flex; align-items:center; gap:10px; padding:10px 12px; margin:6px 0;
      border:1px solid transparent; border-radius:12px; cursor:pointer; transition:.15s}
   .h-item:hover{background:var(--card); border-color:var(--line)}
   .h-item.active{background:linear-gradient(135deg, rgba(139,92,246,.18), rgba(34,211,238,.14)); border-color:rgba(139,92,246,.35); box-shadow:var(--glow-violet)}
   .h-item.title{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:13.5px}
   .h-item.time{font-size:11px; color:var(--muted)}
   .side-foot{padding:12px; border-top:1px solid var(--line); display:grid; gap:10px}
   .row{display:flex; gap:8px; align-items:center}
   .select,.btn{border:1px solid var(--line); background:var(--card); color:var(--text);
      padding:10px 12px; border-radius:12px; font:inherit; cursor:pointer; transition:.2s}
   .select{flex:1; appearance:none; padding-inline-end:28px}
   .btn:hover{box-shadow:var(--glow-cyan); transform:translateY(-1px)}
   .btn.icon{width:42px; height:42px; display:grid; place-items:center; padding:0}

   .main{flex:1; min-width:0; display:flex; flex-direction:column; height:100%}
   .topbar{position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:12px 14px; border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(8,16,32,.8), rgba(8,16,32,.45)); backdrop-filter:blur(var(--blur))}
   .topbar.left{display:flex; align-items:center; gap:10px; min-width:0}
   .menu{display:none}
   .title{font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
   .subtitle{font-size:12px; color:var(--muted)}
   .chips{display:flex; gap:8px; overflow:auto; padding:0 2px}
   .chip{flex:0 0 auto; padding:7px 11px; border-radius:999px; font-size:12px; cursor:pointer;
      border:1px solid var(--line); background:var(--card); color:var(--text); transition:.2s}
   .chip:hover{box-shadow:var(--glow-violet)}

   .chat-wrap{flex:1; min-height:0; display:flex; flex-direction:column; max-width:1100px; width:100%; margin:0 auto; padding:0 12px}
   .chat{flex:1; min-height:0; overflow:auto; padding:14px 2px 18px; scroll-behavior:smooth}
   .empty{min-height:100%; display:grid; place-items:center; text-align:center; padding:28px}
   .empty.box{max-width:520px; background:var(--card); border:1px solid var(--line); border-radius:28px; padding:28px 22px; backdrop-filter:blur(var(--blur)); box-shadow:var(--shadow)}
   .empty h2{margin:0 0 8px; font-size:24px}
   .empty p{margin:0; color:var(--muted); line-height:1.9}

   .msg{display:flex; gap:10px; align-items:flex-end; margin:12px 0; opacity:0; transform:translateY(8px); animation:fade.28s ease forwards}
    @keyframes fade{to{opacity:1; transform:translateY(0)}}
    html[dir="rtl"].msg.user{justify-content:flex-start}
    html[dir="rtl"].msg.assistant{justify-content:flex-end}
    html[dir="ltr"].msg.user{justify-content:flex-end}
    html[dir="ltr"].msg.assistant{justify-content:flex-start}
   .bubble{max-width:min(78%,760px); padding:14px 16px; line-height:1.9; white-space:pre-wrap; word-break:break-word;
      border-radius:22px; border:1px solid var(--line); backdrop-filter:blur(var(--blur)); box-shadow:var(--shadow)}
   .user.bubble{background:linear-gradient(135deg, rgba(139,92,246,.95), rgba(34,211,238,.9)); color:#fff; border-color:transparent; box-shadow:var(--glow-violet)}
   .assistant.bubble{background:var(--card)}
    html[dir="rtl"].user.bubble{border-bottom-right-radius:8px}
    html[dir="rtl"].assistant.bubble{border-bottom-left-radius:8px}
    html[dir="ltr"].user.bubble{border-bottom-left-radius:8px}
    html[dir="ltr"].assistant.bubble{border-bottom-right-radius:8px}
   .meta{font-size:11px; color:var(--muted); margin-top:6px; display:flex; gap:6px}
   .avatar{width:30px; height:30px; border-radius:10px; display:grid; place-items:center; flex:0 0 auto; background:linear-gradient(135deg,var(--violet),var(--cyan)); color:#fff; font-size:13px; box-shadow:var(--glow-cyan)}
   .typing{display:inline-flex; gap:5px; align-items:center}
   .typing span{width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.6; animation:dot 1s infinite}
   .typing span:nth-child(2){animation-delay:.15s}
   .typing span:nth-child(3){animation-delay:.3s}
    @keyframes dot{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-4px);opacity:1}}

   .suggest{display:flex; gap:8px; overflow:auto; padding:8px 2px 0; margin-bottom:6px}
   .composer-wrap{position:sticky; bottom:0; padding:10px 0 14px; background:linear-gradient(180deg, transparent, rgba(0,0,0,.18) 30%, rgba(0,0,0,.28))}
   .composer{display:flex; gap:10px; align-items:flex-end; background:var(--card); border:1px solid var(--line);
      border-radius:26px; padding:10px; backdrop-filter:blur(var(--blur)); box-shadow:var(--shadow)}
    textarea{flex:1; resize:none; border:0; outline:0; background:transparent; color:var(--text);
      font:inherit; line-height:1.9; min-height:26px; max-height:160px; padding:8px 10px}
   .tools{display:flex; gap:8px}
   .iconbtn{width:46px; height:46px; border-radius:16px; display:grid; place-items:center; cursor:pointer; flex:0 0 auto;
      border:1px solid var(--line); background:var(--card-2); color:var(--text); transition:.2s}
   .iconbtn.primary{background:linear-gradient(135deg,var(--violet),var(--cyan)); color:#fff; border-color:transparent; box-shadow:var(--glow-violet)}
   .iconbtn:disabled{opacity:.5; cursor:not-allowed}
   .iconbtn:hover{transform:translateY(-1px)}
   .hint{display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; color:var(--muted); font-size:12px; padding:6px 8px 0}

   .backdrop{position:fixed; inset:0; background:rgba(0,0,0,.45); opacity:0; pointer-events:none; transition:.2s; z-index:40}
   .backdrop.show{opacity:1; pointer-events:auto}
    @media (max-width:960px){
     .sidebar{position:fixed; inset-block:0; inset-inline-start:0; z-index:50; width:86%; max-width:340px; transform:translateX(-105%); transition:transform.28s ease; box-shadow:var(--shadow)}
      html[dir="rtl"].sidebar{inset-inline-start:auto; inset-inline-end:0; transform:translateX(105%)}
     .sidebar.open{transform:none}
     .menu{display:grid}
     .bubble{max-width:88%}
     .composer{border-radius:22px; padding:8px}
     .iconbtn,.iconbtn.primary{width:44px; height:44px; border-radius:14px}
    }
  </style>
</head><body>
  <div class="app">
    <aside id="sidebar" class="sidebar">
      <div class="side-head">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1 id="brandTitle">دستیار هوشمند</h1>
            <p id="brandSub">چت مدرن • Glassmorphism</p>
          </div>
        </div>
        <button class="newchat" id="newChatBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          <span>گفتگوی جدید</span>
        </button>
        <div class="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="historySearch" placeholder="جستجوی تاریخچه..." />
        </div>
      </div>
      <div class="history" id="historyList"></div>
      <div class="side-foot">
        <div class="row">
          <select id="modelSelect" class="select">
            <option value="auto">auto</option>
            <option value="gpt-4o-mini">gpt-4o-mini</option>
            <option value="claude-3-haiku">claude-3-haiku</option>
            <option value="llama-3.1">llama-3.1</option>
          </select>
        </div>
        <div class="row">
          <button class="btn" id="langToggle">EN</button>
          <button class="btn icon" id="themeToggle" title="Theme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 0 1 1-9-9Z"/></svg>
          </button>
          <button class="btn icon" id="clearAllBtn" title="Clear">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="left">
          <button class="iconbtn menu" id="menuBtn" aria-label="Menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <div>
            <div class="title" id="chatTitle">گفتگو</div>
            <div class="subtitle" id="chatSubtitle">آماده پاسخ‌دهی</div>
          </div>
        </div>
        <div class="chips" id="quickChips"></div>
      </header>

      <div class="chat-wrap">
        <div class="suggest" id="suggestions"></div>
        <div class="chat" id="chat"></div>
        <div class="composer-wrap">
          <div class="composer">
            <textarea id="input" rows="1" placeholder="پیامت را بنویس..."></textarea>
            <div class="tools">
              <button class="iconbtn" id="voiceBtn" title="Voice">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v4M8 23h8"/></svg>
              </button>
              <button class="iconbtn primary" id="sendBtn" title="Send">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
              </button>
            </div>
          <div class="hint">
            <span id="hintText">Enter برای ارسال • Shift+Enter خط جدید</span>
            <span><span id="tokenCount">0</span> <span data-i18n="tokens">توکن</span> • <span id="statusText">آماده</span></span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="backdrop" id="backdrop"></div>

<script>
const API_URL='/v1/chat/completions';
const API_KEY='freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
const I18N={
  fa:{brandTitle:'دستیار هوشمند',brandSub:'چت مدرن • Glassmorphism',newChat:'گفتگوی جدید',search:'جستجوی تاریخچه...',placeholder:'پیامت را بنویس...',hint:'Enter برای ارسال • Shift+Enter خط جدید',ready:'آماده',typing:'در حال نوشتن...',tokens:'توکن',chat:'گفتگو',suggestions:['خلاصه کن','ایده بده','کد بنویس','ترجمه کن','بهبود متن'],emptyTitle:'سلام! چی کمکت کنم؟',emptyDesc:'سوال بپرس، متن بده، یا یک ایده را شروع کن. من سریع و تمیز جواب می‌دم.',quick:['توضیح ساده','مثال بزن','مرحله به مرحله','مقایسه کن']},
  en:{brandTitle:'AI Assistant',brandSub:'Modern Chat • Glassmorphism',newChat:'New chat',search:'Search history...',placeholder:'Type your message...',hint:'Enter to send • Shift+Enter for new line',ready:'Ready',typing:'Typing...',tokens:'tokens',chat:'Chat',suggestions:['Summarize','Brainstorm','Write code','Translate','Improve text'],emptyTitle:'Hey! How can I help?',emptyDesc:'Ask anything, paste text, or kick off an idea. I’ll reply fast and clean.',quick:['Explain simply','Give example','Step by step','Compare']}
};
const $=s=>document.querySelector(s);
const chatEl=$('#chat'),inputEl=$('#input'),sendBtn=$('#sendBtn'),voiceBtn=$('#voiceBtn');
const historyList=$('#historyList'),historySearch=$('#historySearch');
const newChatBtn=$('#newChatBtn'),clearAllBtn=$('#clearAllBtn');
const modelSelect=$('#modelSelect'),langToggle=$('#langToggle'),themeToggle=$('#themeToggle');
const menuBtn=$('#menuBtn'),sidebar=$('#sidebar'),backdrop=$('#backdrop');
const suggestionsEl=$('#suggestions'),quickChips=$('#quickChips');
const tokenCount=$('#tokenCount'),statusText=$('#statusText'),hintText=$('#hintText');
const brandTitle=$('#brandTitle'),brandSub=$('#brandSub'),chatTitle=$('#chatTitle'),chatSubtitle=$('#chatSubtitle');

let lang=localStorage.getItem('lang')||'fa';
let theme=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');
let conversations=JSON.parse(localStorage.getItem('ai_convos_v2')||'[]');
let currentId=localStorage.getItem('ai_current_id')||null;
let busy=false;

const t=k=>I18N[lang][k];
function nowTime(){return new Intl.DateTimeFormat(lang==='fa'?'fa-IR':'en-US',{hour:'2-digit',minute:'2-digit'}).format(new Date())}
function saveAll(){localStorage.setItem('ai_convos_v2',JSON.stringify(conversations));localStorage.setItem('ai_current_id',currentId||'');localStorage.setItem('lang',lang);localStorage.setItem('theme',theme)}
function applyTheme(){document.documentElement.classList.toggle('light',theme==='light')}
function applyLang(){
  document.documentElement.lang=lang; document.documentElement.dir=lang==='fa'?'rtl':'ltr'; inputEl.dir=lang==='fa'?'rtl':'ltr';
  brandTitle.textContent=t('brandTitle'); brandSub.textContent=t('brandSub'); newChatBtn.querySelector('span').textContent=t('newChat');
  historySearch.placeholder=t('search'); inputEl.placeholder=t('placeholder'); hintText.textContent=t('hint');
  statusText.textContent=t('ready'); chatTitle.textContent=t('chat'); chatSubtitle.textContent=t('ready');
  langToggle.textContent=lang==='fa'?'EN':'FA'; document.querySelectorAll('[data-i18n="tokens"]').forEach(n=>n.textContent=t('tokens'));
  renderSuggestions(); renderQuick(); renderHistory(); renderChat();
}
function estimateTokens(s){return Math.max(1,Math.ceil((s||'').length/4))}
function updateTokens(){tokenCount.textContent=estimateTokens(inputEl.value)}

function createConversation(){const id='c_'+Math.random().toString(36).slice(2,9);const convo={id,title:t('chat'),messages:[],updated:Date.now()};conversations.unshift(convo);currentId=id;saveAll();renderHistory();renderChat()}
function getCurrent(){return conversations.find(c=>c.id===currentId)}
function setTitleFromFirst(convo){const first=convo.messages.find(m=>m.role==='user');if(first)convo.title=first.content.slice(0,42).replace(/\s+/g,' ').trim()||t('chat')}

function renderHistory(){
  const q=(historySearch.value||'').toLowerCase(); historyList.innerHTML='';
  conversations.filter(c=>!q||c.title.toLowerCase().includes(q)||c.messages.some(m=>m.content.toLowerCase().includes(q))).forEach(c=>{
    const item=document.createElement('div');item.className='h-item'+(c.id===currentId?' active':'');
    item.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H7l-4 4V5a2 2 0 0 1 2-2h10a4 4 0 0 1 4 4v8Z"/></svg><div class="title">${escapeHtml(c.title)}</div><div class="time">${new Date(c.updated).toLocaleDateString(lang==='fa'?'fa-IR':'en-US')}</div>`;
    item.onclick=()=>{currentId=c.id;saveAll();renderHistory();renderChat();closeSidebar()}; historyList.appendChild(item);
  })
}
function renderSuggestions(){suggestionsEl.innerHTML='';t('suggestions').forEach(s=>{const b=document.createElement('button');b.className='chip';b.textContent=s;b.onclick=()=>{inputEl.value=s+(lang==='fa'?' : ':': ');inputEl.focus();updateTokens();autoResize()};suggestionsEl.appendChild(b)})}
function renderQuick(){quickChips.innerHTML='';t('quick').forEach(s=>{const b=document.createElement('button');b.className='chip';b.textContent=s;b.onclick=()=>{inputEl.value=(inputEl.value?inputEl.value+'\n':'')+s;inputEl.focus();updateTokens();autoResize()};quickChips.appendChild(b)})}
function escapeHtml(str){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

function renderChat(){
  const convo=getCurrent(); chatEl.innerHTML='';
  if(!convo||!convo.messages.length){chatEl.innerHTML=`<div class="empty"><div class="box"><h2>${t('emptyTitle')}</h2><p>${t('emptyDesc')}</p></div></div>`;chatTitle.textContent=t('chat');return}
  chatTitle.textContent=convo.title; convo.messages.forEach(m=>appendBubble(m.role,m.content,m.ts)); chatEl.scrollTop=chatEl.scrollHeight;
}
function appendBubble(role,content,ts){
  const wrap=document.createElement('div');wrap.className=`msg ${role}`;const time=ts||nowTime();const avatar=role==='assistant'?'AI':(lang==='fa'?'ش':'U');
  const meta=role==='assistant'?time:`${time} • ${lang==='fa'?'شما':'You'}`;
  wrap.innerHTML=role==='assistant'
   ?`<div class="avatar">${avatar}</div><div class="bubbleWrap"><div class="bubble assistant">${escapeHtml(content)}</div><div class="meta">${meta}</div></div>`
    :`<div class="bubbleWrap"><div class="bubble user">${escapeHtml(content)}</div><div class="meta">${meta}</div></div><div class="avatar">${avatar}</div>`;
  chatEl.appendChild(wrap);chatEl.scrollTop=chatEl.scrollHeight;return wrap.querySelector('.bubble')
}
function typingNode(){const n=document.createElement('div');n.className='msg assistant';n.innerHTML=`<div class="avatar">AI</div><div class="bubbleWrap"><div class="bubble assistant"><span class="typing"><span></span><span></span></span></div><div class="meta">${t('typing')}</div></div>`;chatEl.appendChild(n);chatEl.scrollTop=chatEl.scrollHeight;return n}

async function sendMessage(){
  const text=inputEl.value.trim();if(!text||busy)return;
  let convo=getCurrent();if(!convo){createConversation();convo=getCurrent()}
  convo.messages.push({role:'user',content:text,ts:nowTime()});setTitleFromFirst(convo);convo.updated=Date.now();saveAll();
  renderChat();inputEl.value='';updateTokens();autoResize();
  busy=true;sendBtn.disabled=true;statusText.textContent=t('typing');const typing=typingNode();
  try{
    const payload={model:modelSelect.value||'auto',messages:convo.messages.map(({role,content})=>({role,content}))};
    const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},body:JSON.stringify(payload)});
    const data=await res.json();const content=data?.choices?.[0]?.message?.content||(lang==='fa'?'پاسخی دریافت نشد.':'No response.');
    typing.remove();const bubble=appendBubble('assistant','',nowTime());await typeOut(bubble,content);
    convo.messages.push({role:'assistant',content,ts:nowTime()});convo.updated=Date.now();saveAll();renderHistory();statusText.textContent=t('ready');
  }catch(e){typing.remove();appendBubble('assistant',lang==='fa'?'خطا در ارتباط. دوباره تلاش کنید.':'Connection error. Try again.');statusText.textContent='Error'}
  finally{busy=false;sendBtn.disabled=false;inputEl.focus()}
}
async function typeOut(el,text){el.textContent='';for(let i=0;i<text.length;i++){el.textContent+=text[i];if(i%4===0)chatEl.scrollTop=chatEl.scrollHeight;await new Promise(r=>setTimeout(r,8))}}
function autoResize(){inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,160)+'px'}

let rec=null,listening=false;
function setupVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){voiceBtn.disabled=true;return}
  rec=new SR();rec.interimResults=true;rec.continuous=false;
  rec.onresult=e=>{let txt='';for(const r of e.results)txt+=r[0].transcript;inputEl.value=txt;updateTokens();autoResize()};
  rec.onend=()=>{listening=false;voiceBtn.classList.remove('primary')};
}
voiceBtn.onclick=()=>{if(!rec)return;listening=!listening;if(listening){rec.lang=lang==='fa'?'fa-IR':'en-US';rec.start();voiceBtn.classList.add('primary')}else{rec.stop()}};

function openSidebar(){sidebar.classList.add('open');backdrop.classList.add('show')}
function closeSidebar(){sidebar.classList.remove('open');backdrop.classList.remove('show')}
menuBtn.onclick=openSidebar;backdrop.onclick=closeSidebar;

inputEl.addEventListener('input',()=>{updateTokens();autoResize()});
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
sendBtn.onclick=sendMessage;
newChatBtn.onclick=()=>{createConversation();closeSidebar()};
clearAllBtn.onclick=()=>{if(confirm(lang==='fa'?'همه گفتگوها پاک شود؟':'Clear all chats?')){conversations=[];currentId=null;saveAll();renderHistory();renderChat()}};
historySearch.oninput=renderHistory;
langToggle.onclick=()=>{lang=lang==='fa'?'en':'fa';applyLang();setupVoice();saveAll()};
themeToggle.onclick=()=>{theme=theme==='dark'?'light':'dark';applyTheme();saveAll()};
modelSelect.onchange=saveAll;

applyTheme();applyLang();setupVoice();updateTokens();autoResize();
if(!conversations.length)createConversation();else{if(!currentId)currentId=conversations[0].id;renderHistory();renderChat()}
</script>
</body>
</html>
