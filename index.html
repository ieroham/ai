<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>دستیار هوشمند</title>
<style>
:root{--bg:#0a0f1f;--bg2:#111936;--text:#e6e9f2;--muted:#9aa3b2;--glass:rgba(255,255,255,.06);--accent1:#7c3aed;--accent2:#3b82f6;--bubble-user:linear-gradient(135deg,var(--accent1),var(--accent2));--border:rgba(255,255,255,.1);--shadow:0 10px 30px rgba(0,0,0,.35)}
@media (prefers-color-scheme:light){:root{--bg:#f6f7fb;--bg2:#ffffff;--text:#0b1020;--muted:#5b6475;--glass:rgba(255,255,255,.7);--border:rgba(0,0,0,.08);--shadow:0 10px 30px rgba(16,24,40,.08)}}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:system-ui,Vazirmatn,sans-serif;background:radial-gradient(1200px 800px at 80% -10%,rgba(124,58,237,.25),transparent),radial-gradient(1000px 600px at -10% 110%,rgba(59,130,246,.2),transparent),var(--bg);color:var(--text);display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:10;background:linear-gradient(to bottom,rgba(0,0,0,.25),transparent),var(--bg2);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.bar{max-width:900px;margin:auto;padding:14px 16px;display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:10px;background:var(--bubble-user);display:grid;place-items:center;box-shadow:var(--shadow)}
.logo svg{width:18px;height:18px;fill:white}
.title{font-weight:700;font-size:16px}
main{flex:1;overflow:auto}
.chat{max-width:900px;margin:auto;padding:18px 12px 100px;display:flex;flex-direction:column;gap:12px}
.bubble{max-width:85%;padding:12px 14px;border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow);animation:fade.25s ease;background:var(--glass);backdrop-filter:blur(10px)}
.bubble.user{margin-right:auto;background:var(--bubble-user);color:white;border:none}
.bubble.ai{margin-left:auto}
.meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:var(--muted)}
.avatar{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:rgba(0,0,0,.2);font-size:13px}
.user.meta{justify-content:flex-end;color:rgba(255,255,255,.85)}
.text{white-space:pre-wrap;line-height:1.8;font-size:15px}
.empty{margin:20vh auto;text-align:center;color:var(--muted)}
.empty.hint{margin-top:8px;font-size:13px}
.typing{display:inline-flex;gap:4px}
.typing span{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
footer{position:fixed;bottom:0;inset-inline:0;background:linear-gradient(to top,var(--bg),transparent);padding:12px}
.composer{max-width:900px;margin:auto;display:flex;gap:8px;align-items:flex-end;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:8px;box-shadow:var(--shadow);backdrop-filter:blur(12px)}
textarea{flex:1;background:transparent;border:0;outline:0;color:var(--text);resize:none;max-height:160px;min-height:44px;padding:10px 8px;font:inherit;line-height:1.7}
.btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--glass);display:grid;place-items:center;cursor:pointer;transition:.2s}
.btn:hover{transform:translateY(-1px)}
.btn.send{background:var(--bubble-user);border:none;color:white}
.btn svg{width:20px;height:20px}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-5px);opacity:1}}
@media (min-width:700px){.bubble{max-width:70%}}
</style>
</head>
<body>
<header><div class="bar"><div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-7.07 17.07A10 10 0 1 0 12 2Zm0 3a3 3 0 1 1 0 6 3 3 0 0 1 0-6Z"/></svg></div><div class="title">دستیار هوشمند</div></div></header>
<main><div id="chat" class="chat"><div class="empty" id="empty"><div>سلام! چی کمکت کنم؟</div><div class="hint">پیامت رو بنویس و Enter بزن — Shift+Enter برای خط جدید</div></div></div></main>
<footer><div class="composer"><button class="btn" id="clear" title="پاک کردن"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2m-1 0v14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V6h10z"/></svg></button><textarea id="input" placeholder="بنویس..." autofocus></textarea><button class="btn send" id="send" title="ارسال"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button></div></footer>
<script>
const API_KEY='freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
const chat=document.getElementById('chat'),input=document.getElementById('input'),send=document.getElementById('send'),clear=document.getElementById('clear'),empty=document.getElementById('empty');
let history=JSON.parse(localStorage.getItem('chat_history')||'[]');
function timeFA(){return new Date().toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'})}
function save(){localStorage.setItem('chat_history',JSON.stringify(history))}
function scroll(){chat.parentElement.scrollTo({top:chat.parentElement.scrollHeight,behavior:'smooth'})}
function bubble(role,text){const w=document.createElement('div');w.className='bubble '+role;const m=document.createElement('div');m.className='meta';m.innerHTML=`<span class="avatar">${role==='user'?'👤':'✨'}</span><span>${timeFA()}</span>`;const t=document.createElement('div');t.className='text';t.textContent=text;if(role==='user'){w.appendChild(t);w.appendChild(m)}else{w.appendChild(m);w.appendChild(t)}return w}
function render(){chat.innerHTML='';if(!history.length){chat.appendChild(empty);return}history.forEach(m=>chat.appendChild(bubble(m.role==='assistant'?'ai':m.role,m.content)));scroll()}
function typing(on){let el=document.getElementById('typing');if(on){if(el)return;const w=document.createElement('div');w.className='bubble ai';w.id='typing';w.innerHTML=`<div class="meta"><span class="avatar">✨</span><span>${timeFA()}</span></div><div class="text"><span class="typing"><span></span><span></span></span></div>`;chat.appendChild(w);scroll()}else{el&&el.remove()}}
async function sendMsg(){const text=input.value.trim();if(!text)return;input.value='';history.push({role:'user',content:text});save();render();typing(true);try{const res=await fetch('/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},body:JSON.stringify({model:'auto',messages:history})});if(!res.ok)throw new Error('خطا '+res.status);const data=await res.json();const reply=data.choices?.[0]?.message?.content||'پاسخی دریافت نشد.';typing(false);typeOut(reply)}catch(e){typing(false);history.push({role:'assistant',content:'خطا در ارتباط: '+e.message});save();render()}}
function typeOut(text){const w=bubble('ai','');const txt=w.querySelector('.text');chat.appendChild(w);let i=0;(function step(){txt.textContent=text.slice(0,i++);scroll();if(i<=text.length)setTimeout(step,14);else{history.push({role:'assistant',content:text});save()}})()}
send.onclick=sendMsg;input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}};clear.onclick=()=>{history=[];save();render();input.focus()};
render();
</script>
</body>
</html>
