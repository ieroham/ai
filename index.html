<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>چت</title>
<style>
body{margin:0;background:#030617;color:#fff;font-family:Vazirmatn,Tahoma;display:flex;flex-direction:column;height:100vh}
header{padding:14px;background:#0b1020;text-align:center;border-bottom:1px solid #1e293b}
.chat{flex:1;overflow:auto;padding:16px;max-width:900px;width:100%;margin:auto}
.msg{display:flex;margin:8px 0}.user{justify-content:flex-end}
.b{padding:10px 14px;border-radius:14px;max-width:75%;white-space:pre-wrap;line-height:1.7}
.user.b{background:linear-gradient(135deg,#7c3aed,#3b82f6)}
.ai.b{background:#1e293b;border:1px solid #334155}
.input{display:flex;gap:8px;padding:12px;max-width:900px;width:100%;margin:auto}
textarea{flex:1;background:#0f172a;color:#fff;border:1px solid #334155;border-radius:12px;padding:10px;resize:none;outline:none}
button{padding:0 20px;background:#7c3aed;color:#fff;border:0;border-radius:12px;cursor:pointer}
</style>
</head>
<body>
<header>چت هوش مصنوعی</header>
<div id="c" class="chat"></div>
<div class="input"><textarea id="i" rows="1" placeholder="بنویس..."></textarea><button id="s">ارسال</button></div>
<script>
const c=document.getElementById('c'),i=document.getElementById('i'),s=document.getElementById('s');
const API='/v1/chat/completions';
const KEY='freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
let h=[{role:'system',content:'Answer in Persian'}];
const add=(t,x)=>{const m=document.createElement('div');m.className='msg '+t;m.innerHTML=`<div class="b">${x}</div>`;c.appendChild(m);c.scrollTop=1e9;return m.querySelector('.b')};
async function send(){const v=i.value.trim();if(!v)return;add('user',v);h.push({role:'user',content:v});i.value='';s.disabled=1;const b=add('ai','...');try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify({model:'auto',messages:h})});const d=await r.json();const o=d.choices[0].message.content;b.textContent=o;h.push({role:'assistant',content:o})}catch(e){b.textContent='خطا: '+e.message}s.disabled=0}
s.onclick=send;i.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};
add('ai','سلام! آماده‌ام');
</script>
</body>
</html>
