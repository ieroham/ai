<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دستیار هوشمند</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --secondary: #3b82f6;
            --secondary-dark: #2563eb;
            --bg-light: #ffffff;
            --bg-secondary-light: #f3f4f6;
            --text-light: #1f2937;
            --border-light: #e5e7eb;
            --bg-dark: #0f172a;
            --bg-secondary-dark: #1e293b;
            --text-dark: #e2e8f0;
            --border-dark: #334155;
        }

        @media (prefers-color-scheme: light) {
            body {
                --bg: var(--bg-light);
                --bg-secondary: var(--bg-secondary-light);
                --text: var(--text-light);
                --border: var(--border-light);
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                --bg: var(--bg-dark);
                --bg-secondary: var(--bg-secondary-dark);
                --text: var(--text-dark);
                --border: var(--border-dark);
            }
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Vazirmatn", sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            .header {
                background: rgba(15, 23, 42, 0.7);
            }
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-clear {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .btn-clear:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            gap: 2rem;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .empty-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
        }

        .message {
            display: flex;
            gap: 0.75rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
            justify-content: flex-start;
        }

        .message.ai {
            flex-direction: row;
            justify-content: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
            color: white;
        }

        .avatar.user {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }

        .avatar.ai {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .bubble {
            max-width: 70%;
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .bubble-content {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .message.user .bubble-content {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border-bottom-right-radius: 0;
        }

        .message.ai .bubble-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom-left-radius: 0;
            color: var(--text);
        }

        .timestamp {
            font-size: 0.75rem;
            color: var(--text);
            opacity: 0.6;
            margin-top: 0.25rem;
        }

        .message.user .timestamp {
            text-align: left;
        }

        .message.ai .timestamp {
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            gap: 0.25rem;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 0.5rem;
            border-bottom-left-radius: 0;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text);
            opacity: 0.6;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.6;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        .input-area {
            border-top: 1px solid var(--border);
            padding: 1rem;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        @media (prefers-color-scheme: dark) {
            .input-area {
                background: rgba(15, 23, 42, 0.5);
            }
        }

        .input-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            max-height: 120px;
            min-height: 40px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .btn-send {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .btn-send:active {
            transform: scale(0.95);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            animation: slideUp 0.3s ease-out;
            backdrop-filter: blur(10px);
            z-index: 2000;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .bubble {
                max-width: 85%;
            }

            .header {
                padding: 0.75rem;
            }

            .header-title {
                font-size: 1rem;
            }

            .chat-body {
                padding: 1rem;
                gap: 0.75rem;
            }

            .input-area {
                padding: 0.75rem;
            }

            .toast {
                left: 0.75rem;
                right: 0.75rem;
                bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <span>🤖</span>
                <span>دستیار هوشمند</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-clear" id="clearBtn" title="پاک کردن گفتگو">
                    🗑️
                </button>
            </div>
        </div>

        <div class="chat-body" id="chatBody">
            <div class="empty-state">
                <div class="empty-icon">✨</div>
                <div class="empty-text">سلام! چی کمکت کنم؟</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <textarea
                    id="messageInput"
                    placeholder="پیام خود را بنویسید..."
                    rows="1"
                ></textarea>
            </div>
            <button class="btn-send" id="sendBtn" title="ارسال">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 10L17 3L10 17L8 11H3V10Z" fill="currentColor"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Persian number converter
        const toPersianNumber = (num) => {
            const persianDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return String(num).replace(/\d/g, (digit) => persianDigits[digit]);
        };

        const formatTime = (date) => {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${toPersianNumber(hours)}:${toPersianNumber(minutes)}`;
        };

        // DOM Elements
        const chatBody = document.getElementById('chatBody');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
