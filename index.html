<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FreeLLM Chat</title>
<style>
  *{box-sizing:border-box;font-family:Vazirmatn,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  body{margin:0;background:#0b1220;color:#e6edf3;display:flex;justify-content:center;min-height:100vh}
 .app{width:100%;max-width:720px;display:flex;flex-direction:column;height:100vh;padding:16px}
  header{padding:12px 0;text-align:center;font-weight:700;font-size:1.3rem}
  #chat{flex:1;overflow-y:auto;background:#111a2b;border:1px solid #1f2a44;border-radius:16px;padding:16px;margin:12px 0}
 .msg{margin:10px 0;padding:12px 14px;border-radius:12px;line-height:1.7;white-space:pre-wrap}
 .user{background:#1d4ed8;color:white;margin-right:20%;border-bottom-right-radius:4px}
 .bot{background:#0f172a;border:1px solid #23314f;margin-left:20%;border-bottom-left-radius:4px}
 .input{display:flex;gap:8px}
  textarea{flex:1;resize:none;height:56px;padding:12px;border-radius:12px;border:1px solid #23314f;background:#0f172a;color:#e6edf3}
  button{padding:0 20px;border:none;border-radius:12px;background:#22c55e;color:#052e12;font-weight:700;cursor:pointer}
  button:disabled{opacity:.6;cursor:not-allowed}
  footer{font-size:.8rem;opacity:.6;text-align:center;padding:8px}
</style>
</head>
<body>
<div class="app">
  <header>چت با FreeLLM API</header>
  <div id="chat"></div>
  <div class="input">
    <textarea id="prompt" placeholder="سؤالت رو اینجا بنویس..."></textarea>
    <button id="send">ارسال</button>
  </div>
  <footer>مدل: auto | از طریق nginx proxy</footer>
</div>

<script>
const API_KEY = "freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d";
const chat = document.getElementById('chat');
const prompt = document.getElementById('prompt');
const sendBtn = document.getElementById('send');

function addMsg(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user'? 'user' : 'bot');
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send(){
  const text = prompt.value.trim();
  if(!text) return;
  sendBtn.disabled = true;
  addMsg('user', text);
  prompt.value = '';
  const thinking = addMsg('bot', 'در حال دریافت پاسخ...');

  try {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: 'auto',
        messages: [{role: 'user', content: text}],
        stream: false
      })
    });
    const data = await res.json();
    thinking.textContent = data.choices?.[0]?.message?.content || JSON.stringify(data);
  } catch(err){
    thinking.textContent = 'خطا: ' + err.message;
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.onclick = send;
prompt.addEventListener('keydown', e => {
  if(e.key === 'Enter' &&!e.shiftKey){ e.preventDefault(); send(); }
});
</script>
</body>
</html>
