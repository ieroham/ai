<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>چت هوش مصنوعی</title>
<style>
:root{--bg:#030617;--glass:rgba(255,255,255,.06);--border:rgba(255,255,255,.12);--text:#e8eaf0;--muted:#9aa3b2;--p1:#7c3aed;--p2:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Vazirmatn,Tahoma,sans-serif;background:#030617;color:var(--text);height:100dvh;display:flex;flex-direction:column}
header{padding:14px 18px;background:rgba(7,10,20,.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
h1{font-size:18px}.chat{flex:1;overflow-y:auto;padding:20px 16px;max-width:920px;margin:0 auto;width:100%}
.msg{display:flex;margin:12px 0}.msg.user{justify-content:flex-end}.bubble{max-width:75%;padding:12px 16px;border-radius:18px;line-height:1.8;white-space:pre-wrap}
.user.bubble{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-bottom-right-radius:6px}
.ai.bubble{background:var(--glass);border:1px solid var(--border);border-bottom-left-radius:6px}
.input-area{padding:12px;background:linear-gradient(to top,rgba(3,6,23,.95),transparent)}
.wrap{display:flex;gap:8px;max-width:920px;margin:0 auto;background:rgba(15,19,35,.9);border:1px solid var(--border);border-radius:24px;padding:8px 12px}
textarea{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:16px;resize:none;max-height:120px}
button{width:40px;height:40px;border-radius:50%;border:0;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;cursor:pointer}
</style>
</head>
<body>
<header><h1>چت هوش مصنوعی ✨</h1><div style="font-size:12px;color:#9aa3b2">مدل: Auto</div></header>
<main id="chat" class="chat"></main>
<footer class="input-area"><div class="wrap"><textarea id="inp" placeholder="بنویس..." rows="1"></textarea><button id="send">➤</button></div></footer>
<script>
const chat=document.getElementById('chat'),inp=document.getElementById('inp'),btn=document.getElementById('send');
const TARGET='https://freellmapi-production-3240.up.railway.app/v1/chat/completions';
const API='https://corsproxy.io/?'+encodeURIComponent(TARGET);
const KEY='freellmapi-5844744d1b29b5e5141f4416bbb7e476c271fc8b2886489d';
let hist=[{role:'system',content:'You are a helpful Persian assistant.'}];
function add(r,t){const m=document.createElement('div');m.className='msg '+r;const b=document.createElement('div');b.className='bubble';b.textContent=t;m.appendChild(b);chat.appendChild(m);chat.scrollTop=chat.scrollHeight;return b}
async function send(){const txt=inp.value.trim();if(!txt)return;add('user',txt);hist.push({role:'user',content:txt});inp.value='';btn.disabled=true;const b=add('ai','...');try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify({model:'auto',messages:hist,stream:true})});const rd=r.body.getReader();const dec=new TextDecoder();let out='',buf='';b.textContent='';while(true){const {done,v}=await rd.read();if(done)break;buf+=dec.decode(v,{stream:true});for(const l of buf.split('\n')){if(l.startsWith('data:')){const d=l.slice(5).trim();if(d&&d!=='[DONE]'){try{out+=JSON.parse(d).choices[0].delta.content||'';b.textContent=out;chat.scrollTop=chat.scrollHeight}catch{}}}}buf=''}hist.push({role:'assistant',content:out})}catch(e){b.textContent='خطا در اتصال'}btn.disabled=false}
inp.oninput=()=>{inp.style.height='auto';inp.style.height=inp.scrollHeight+'px';btn.disabled=!inp.value.trim()};btn.onclick=send;inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};
add('ai','سلام! بپرس...');
</script>
</body>
</html>
